// 紙芝居：背景画像＋フィルタ＋話者ボックス＋テキスト
function drawKamishibaiSceneList(list, idx, t, label) {
  const sc = list[idx];
  if (!sc) return;

  const dur = sc.dur || 4;
  const inT = 0.6, outT = 0.5;
  let alpha = 1;
  if (sc.kind === "cta" || sc.kind === "title" && dur >= 90) {
    alpha = Math.min(1, t / inT);
  } else {
    if (t < inT) alpha = t / inT;
    else if (t > dur - outT) alpha = Math.max(0, (dur - t) / outT);
  }

  // 1) 全画面塗り潰し
  ctx.fillStyle = "#06080c";
  ctx.fillRect(0, 0, W, H);

  // 2) 背景画像：シーン専用画像があれば優先、無ければ BG_STATES、最後は単色
  const bgIdx = (sc.bg == null) ? 1 : Math.max(0, Math.min(3, sc.bg));
  let scene = null;
  if (label === "prologue" && PROLOGUE_IMAGES[idx]) scene = PROLOGUE_IMAGES[idx];
  else if (label === "ending" && game && ENDING_IMAGES[game.endKind] && ENDING_IMAGES[game.endKind][idx]) {
    scene = ENDING_IMAGES[game.endKind][idx];
  }
  const bg = scene || BG_STATES[bgIdx];
  const top = 32, bot = 192;  // 中央 160px 帯
  if (bg && bg.complete && bg.naturalWidth > 0) {
    ctx.drawImage(bg, 0, top, W, bot - top);
  } else {
    const tone = ["#d8f0e8", "#c8d8c0", "#9c8a78", "#5a4f47"][bgIdx];
    ctx.fillStyle = tone; ctx.fillRect(0, top, W, bot - top);
  }
  // フィルタ（上塗り）
  if (sc.filter === "sepia") {
    ctx.fillStyle = "rgba(120, 70, 30, 0.32)"; ctx.fillRect(0, top, W, bot - top);
  } else if (sc.filter === "dim") {
    ctx.fillStyle = "rgba(0, 0, 0, 0.42)"; ctx.fillRect(0, top, W, bot - top);
  } else if (sc.filter === "warn") {
    ctx.fillStyle = "rgba(180, 30, 30, 0.18)"; ctx.fillRect(0, top, W, bot - top);
    // 走査線
    ctx.fillStyle = "rgba(255, 60, 40, 0.07)";
    for (let yy = top; yy < bot; yy += 4) ctx.fillRect(0, yy, W, 1);
  } else if (sc.filter === "glow") {
    const g = ctx.createRadialGradient(W/2, (top+bot)/2, 10, W/2, (top+bot)/2, W*0.6);
    g.addColorStop(0, "rgba(255,240,200,0.0)");
    g.addColorStop(0.6, "rgba(255,210,140,0.18)");
    g.addColorStop(1, "rgba(40,20,0,0.45)");
    ctx.fillStyle = g; ctx.fillRect(0, top, W, bot - top);
  }
  // 上下の黒帯（紙芝居のレターボックス）
  ctx.fillStyle = "#05070a";
  ctx.fillRect(0, 0, W, top);
  ctx.fillRect(0, bot, W, H - bot);
  // 帯と画像の境界に金線
  ctx.strokeStyle = `rgba(255, 216, 107, ${0.55 * alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, top + 0.5); ctx.lineTo(W, top + 0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, bot - 0.5); ctx.lineTo(W, bot - 0.5); ctx.stroke();

  // 3) シーン番号
  ctx.fillStyle = "rgba(180, 180, 180, 0.5)";
  ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textAlign = "right"; ctx.textBaseline = "top";
  ctx.fillText(`${idx + 1} / ${list.length}`, W - 6, 6);
  ctx.textAlign = "left";

  // 4) 話者バッジ（dlg / memo は専用配置）
  ctx.textBaseline = "middle";
  if (sc.kind === "dlg" && sc.speaker) {
    const sp = sc.speaker;
    ctx.font = `800 10px "Yu Gothic UI", Meiryo, sans-serif`;
    const sw = Math.ceil(ctx.measureText(sp).width) + 14;
    ctx.fillStyle = `rgba(70, 30, 18, ${alpha * 0.95})`;
    ctx.fillRect(8, top + 4, sw, 16);
    ctx.strokeStyle = `rgba(255, 216, 107, ${alpha})`;
    ctx.strokeRect(8.5, top + 4.5, sw - 1, 15);
    ctx.fillStyle = `rgba(255, 216, 107, ${alpha})`;
    ctx.textAlign = "left";
    ctx.fillText(sp, 14, top + 12);
  } else if (sc.kind === "memo" && sc.head) {
    // メモ：上部に題字
    ctx.font = `900 12px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.fillStyle = `rgba(255, 230, 180, ${alpha})`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
    ctx.strokeText(sc.head, W/2, top - 12);
    ctx.fillText(sc.head, W/2, top - 12);
  } else if (sc.head && sc.kind === "title") {
    // タイトル：でかめ・上部
    ctx.font = `900 18px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 6; ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
    ctx.strokeText(sc.head, W/2, 18);
    ctx.fillStyle = `rgba(255, 170, 80, ${alpha})`;
    ctx.fillText(sc.head, W/2, 18);
  } else if (sc.head) {
    // narr：右上にヘッド
    ctx.font = `900 12px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
    ctx.strokeText(sc.head, W/2, 18);
    ctx.fillStyle = `rgba(240, 220, 180, ${alpha})`;
    ctx.fillText(sc.head, W/2, 18);
  }

  // 5) 本文（下の黒帯にレイアウト）
  if (sc.body && sc.body.length) {
    const baseY = bot + 12;
    ctx.font = `800 11px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4;
    for (let i = 0; i < sc.body.length; i++) {
      const ly = baseY + i * 13;
      ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
      ctx.strokeText(sc.body[i], W/2, ly);
      const isCtaHint = sc.kind === "cta" && (sc.body[i].includes("[") || i > 0);
      ctx.fillStyle = isCtaHint
        ? `rgba(184, 242, 173, ${alpha * (0.5 + 0.5 * Math.abs(Math.sin(performance.now()/420)))})`
        : `rgba(245, 245, 245, ${alpha})`;
      ctx.fillText(sc.body[i], W/2, ly);
    }
  }

  // 6) 操作ヒント
  ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.fillStyle = `rgba(160, 160, 160, ${0.55 + 0.45 * Math.abs(Math.sin(performance.now() / 500))})`;
  ctx.textAlign = "center";
  ctx.fillText("クリックで進む（右上ボタンで飛ばす）", W / 2, H - 6);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  drawSkipButton();
}

function drawField() {
  // ★ 動的背景：汚染レベルが上がるほど崩壊状態へ。ステージごとの底上げ＋汚染で大きく動く
  const ac = avgContam();
  const stageBias = (game.stage - 1) * 0.85;        // 各ステージで明確に1段階近く下地を進める
  const fState = Math.max(0, Math.min(3, stageBias + ac / 24));  // 汚染24%で1段階分
  const i0 = Math.floor(fState), i1 = Math.min(3, i0 + 1);
  const blend = fState - i0;
  const A = BG_STATES[i0], B = BG_STATES[i1];
  const aReady = A && A.complete && A.naturalWidth > 0;
  const bReady = B && B.complete && B.naturalWidth > 0;
  const useBG = aReady || bReady;

  if (aReady) {
    ctx.globalAlpha = bReady ? Math.max(0, 1 - blend) : 1;
    ctx.drawImage(A, 0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  }
  if (bReady && i1 !== i0) {
    ctx.globalAlpha = blend;
    ctx.drawImage(B, 0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  }
  ctx.globalAlpha = 1;
  if (!useBG) {
    // フォールバック（旧実装）
    const wall = game.stage === 1 ? "#b7d9e0" : game.stage === 2 ? "#8ea08b" : "#5a4f47";
    const bg   = game.stage === 1 ? "#d8f5ef" : game.stage === 2 ? "#c3d0bd" : "#9a8b78";
    ctx.fillStyle = wall;
    ctx.fillRect(0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
    ctx.fillStyle = bg;
    ctx.fillRect(4, PLAY_TOP + 4, W - 8, PLAY_BOTTOM - PLAY_TOP - 8);
  }

  const bg = game.stage === 1 ? "#d8f5ef" : "#c3d0bd";
  const pathColor = game.stage === 1 ? "#f7f0dc" : "#e4d3a8";

  for (let ty = 0; ty < PLAY_H_TILES; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      const x = tx * TILE, y = PLAY_TOP + ty * TILE;
      const noise = (tx * 17 + ty * 31 + (game.stage - 1) * 19) % 5;
      const isPath = pathTiles.has(ty * MAP_W + tx);
      if (!useBG) {
        ctx.fillStyle = isPath ? shade(pathColor, noise + 1) : shade(bg, noise - 1);
        ctx.fillRect(x, y, TILE, TILE);
      }
      if (isPath) {
        // 背景画像があるときは控えめに、無いときはくっきり
        ctx.fillStyle = useBG
          ? (game.stage === 1 ? "rgba(255, 229, 102, 0.26)" : "rgba(255, 185, 58, 0.36)")
          : (game.stage === 1 ? "rgba(255, 229, 102, 0.42)" : "rgba(255, 185, 58, 0.52)");
        ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
      }
      if (!useBG && !isPath && noise === 0) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
        ctx.fillRect(x + 2, y + 2, 4, 1);
      }
      const c = getContam(tx, ty);
      if (c > 1) {
        const cap = useBG ? 0.55 : 0.82;
        const div = useBG ? 140 : 105;
        ctx.fillStyle = `rgba(92, 45, 24, ${Math.min(cap, c / div)})`;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = `rgba(30, 18, 12, ${Math.min(0.45, c / 160)})`;
        if ((tx + ty) % 2 === 0) ctx.fillRect(x + 3, y + 4, 5, 3);
        if ((tx * 3 + ty) % 4 === 0) ctx.fillRect(x + 9, y + 9, 4, 2);
      }
    }
  }

  // ★ 塔が置いてあるマスは「踏み台」を描いて宙に浮いて見えないようにする
  for (const t of game.towers) {
    if (t.tx == null) continue;
    const x = t.tx * TILE, y = PLAY_TOP + t.ty * TILE;
    // 床面のへこみ（暗い影）
    ctx.fillStyle = "rgba(20, 14, 10, 0.45)";
    ctx.fillRect(x + 1, y + TILE - 4, TILE - 2, 3);
    // タイル全体に薄い色付け（塔ごとに色を変える）
    const tint = t.type === "toilet" ? "rgba(140,200,230,0.22)"
              : t.type === "sink"   ? "rgba(110,200,220,0.22)"
              : t.type === "paper"  ? "rgba(230,210,140,0.22)"
              :                       "rgba(220,120,100,0.22)";
    ctx.fillStyle = tint;
    ctx.fillRect(x, y, TILE, TILE);
    // 縁取り（明るめのライン）
    ctx.strokeStyle = "rgba(255,216,107,0.85)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
    // 内側の小さな枠で「台座」感
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.strokeRect(x + 2.5, y + 2.5, TILE - 5, TILE - 5);
  }

  // ★ 配置可能マスのグリッド線（常時うっすら表示・通路を除く）
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = useBG ? "rgba(255,255,255,0.16)" : "rgba(255,255,255,0.10)";
  for (let ty = 0; ty < PLAY_H_TILES; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      if (pathTiles.has(ty * MAP_W + tx)) continue;
      const x = tx * TILE, y = PLAY_TOP + ty * TILE;
      ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
    }
  }
  // 通路マスの外周だけは赤茶でくっきり
  ctx.strokeStyle = useBG ? "rgba(255,120,80,0.55)" : "rgba(255,120,80,0.45)";
  ctx.lineWidth = 1;
  for (let ty = 0; ty < PLAY_H_TILES; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      if (!pathTiles.has(ty * MAP_W + tx)) continue;
      const x = tx * TILE, y = PLAY_TOP + ty * TILE;
      // 隣が通路でない辺のみ描いて外周だけにする
      if (!pathTiles.has(ty * MAP_W + tx - 1) || tx === 0)        { ctx.beginPath(); ctx.moveTo(x + 0.5, y); ctx.lineTo(x + 0.5, y + TILE); ctx.stroke(); }
      if (!pathTiles.has(ty * MAP_W + tx + 1) || tx === MAP_W-1)  { ctx.beginPath(); ctx.moveTo(x + TILE - 0.5, y); ctx.lineTo(x + TILE - 0.5, y + TILE); ctx.stroke(); }
      if (!pathTiles.has((ty-1) * MAP_W + tx) || ty === 0)        { ctx.beginPath(); ctx.moveTo(x, y + 0.5); ctx.lineTo(x + TILE, y + 0.5); ctx.stroke(); }
      if (!pathTiles.has((ty+1) * MAP_W + tx) || ty === PLAY_H_TILES-1) { ctx.beginPath(); ctx.moveTo(x, y + TILE - 0.5); ctx.lineTo(x + TILE, y + TILE - 0.5); ctx.stroke(); }
    }
  }
  ctx.restore();
}

function shade(hex, step) {
  const v = hex.replace("#", "");
  const r = Math.max(0, Math.min(255, parseInt(v.slice(0,2),16) + step * 5));
  const g = Math.max(0, Math.min(255, parseInt(v.slice(2,4),16) + step * 5));
  const b = Math.max(0, Math.min(255, parseInt(v.slice(4,6),16) + step * 5));
  return `rgb(${r}, ${g}, ${b})`;
}

function drawPathLines() {
  for (let i = 0; i < PATHS.length; i++) {
    const px = pathPx(i);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
    ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath();
    px.forEach((p, k) => k === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.strokeStyle = game.stage === 1 ? "#ffcf4d" : "#ff8f3d";
    ctx.lineWidth = 3;
    ctx.beginPath();
    px.forEach((p, k) => k === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    for (let k = 0; k < px.length - 1; k++) {
      const a = px[k], b = px[k + 1];
      const dx = b.x - a.x, dy = b.y - a.y;
      const length = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.floor(length / 28));
      const angle = Math.atan2(dy, dx);
      for (let s = 1; s <= steps; s++) {
        const tt = s / (steps + 1);
        drawArrow(a.x + dx * tt, a.y + dy * tt, angle);
      }
    }
  }
  for (let i = 0; i < PATHS.length; i++) {
    const PATH = PATHS[i];
    const start = PATH[0], end = PATH[PATH.length - 1];
    const sx = start.tx * TILE + TILE/2;
    const sy = PLAY_TOP + start.ty * TILE + TILE/2;
    ctx.fillStyle = "#251a18";
    roundedRect(sx - 6, sy - 8, 12, 16, 3);
    ctx.fillStyle = game.stage === 1 ? "#533936" : "#1d1210";
    roundedRect(sx - 4, sy - 6, 8, 12, 2);
    ctx.fillStyle = "#ffd75f";
    ctx.fillRect(sx - 1, sy - 1, 2, 2);
    const ex = end.tx * TILE + TILE/2;
    const ey = PLAY_TOP + end.ty * TILE + TILE/2;
    ctx.fillStyle = "#cdd7d9";
    roundedRect(ex - 7, ey - 6, 14, 12, 3);
    ctx.fillStyle = "#f4fbff";
    roundedRect(ex - 5, ey - 4, 10, 8, 2);
    ctx.fillStyle = "#96d9ef";
    ctx.fillRect(ex - 3, ey - 2, 6, 4);
  }
  ctx.lineCap = "butt"; ctx.lineJoin = "miter"; ctx.lineWidth = 1;
}

function drawArrow(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = "#2f2118";
  ctx.beginPath();
  ctx.moveTo(5, 0); ctx.lineTo(-3, -4); ctx.lineTo(-1.5, 0); ctx.lineTo(-3, 4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#fff1a6";
  ctx.beginPath();
  ctx.moveTo(3, 0); ctx.lineTo(-2, -2.5); ctx.lineTo(-1.5, 0); ctx.lineTo(-2, 2.5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawSigns() {
  if (game.stage === 1) {
    drawNote(2, PLAY_TOP + 4, "清掃中(嘘)");
    drawNote(2, PLAY_TOP + 100, "故障 直す予定なし");
  } else {
    drawNote(2, PLAY_TOP + 4, "もう手遅れ");
    drawNote(2, PLAY_TOP + 100, "頼む 押し返して");
  }
  ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
  for (let i = 0; i < PATHS.length; i++) {
    const start = PATHS[i][0];
    const sx = start.tx * TILE + TILE/2;
    const sy = PLAY_TOP + start.ty * TILE + TILE/2;
    const label = game.stage === 1 ? (i === 0 ? "入口A" : "入口B") : (i === 0 ? "汚染源A" : "汚染源B");
    const tw = Math.ceil(ctx.measureText(label).width) + 6;
    const nx = Math.max(2, Math.min(W - tw - 2, sx - tw/2));
    drawNote(nx, sy - 14, label);
  }
}
function drawNote(x, y, value) {
  ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
  const w = Math.ceil(ctx.measureText(value).width) + 6;
  ctx.fillStyle = game.stage === 1 ? "#fff8d8" : "#ffd074";
  roundedRect(x, y, w, 11, 2);
  ctx.strokeStyle = "#40352a";
  ctx.lineWidth = 0.6;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, 10);
  tinyText(value, x + 3, y + 6, "#40352a");
}

function drawTower(t) {
  const base = { x: t.cx, y: t.cy };
  const pulse = t.attackFlash || 0;
  const bob = Math.sin(t.bob || 0) * 0.8;
  const hit = (t.hitFlash || 0) * 0.8;
  const shake = hit > 0 ? (Math.random() - 0.5) * hit * 2 : 0;
  const isMoving = (t === game.movingTower);
  const lift = isMoving ? 3 + Math.sin(performance.now() / 140) * 1.2 : 0;
  const p = { x: base.x + shake, y: base.y + bob - pulse * 1.4 - lift };

  // 移動モード中ならマス枠＋射程を強調表示
  if (isMoving && t.tx != null) {
    ctx.save();
    ctx.fillStyle = "rgba(255, 216, 107, 0.18)";
    ctx.fillRect(t.tx * TILE, PLAY_TOP + t.ty * TILE, TILE, TILE);
    ctx.strokeStyle = "#ffd86b";
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);
    ctx.strokeRect(t.tx * TILE + 0.5, PLAY_TOP + t.ty * TILE + 0.5, TILE - 1, TILE - 1);
    ctx.setLineDash([]);
    if (t.def.range) {
      ctx.strokeStyle = "rgba(255, 216, 107, 0.55)";
      ctx.beginPath();
      ctx.arc(t.cx, t.cy, t.def.range, 0, Math.PI * 2);
      ctx.stroke();
    } else if (t.def.radius) {
      ctx.strokeStyle = "rgba(255, 248, 216, 0.55)";
      ctx.beginPath();
      ctx.arc(t.cx, t.cy, t.def.radius * TILE, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  if (t.tx != null) {
    ctx.fillStyle = `rgba(0, 0, 0, ${isMoving ? 0.5 : 0.28})`;
    ctx.beginPath();
    ctx.ellipse(p.x, base.y + 7, 7 + (isMoving ? 1 : 0), 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (pulse > 0) drawTowerAttackMotion(t, base, pulse);

  // ボディ: スプライト優先、なければ手描き
  const spec = SPRITES[t.type];
  let frame = 0;
  if (spec) {
    if (pulse > 0.25 && spec.attackFrame != null) frame = spec.attackFrame;
    else frame = (Math.floor((t.bob || 0) * 1.5) % 2);
  }
  const drewSprite = drawSpriteFrame(t.type, frame, p.x, p.y);
  if (!drewSprite) {
    if (t.type === "toilet") {
      ctx.fillStyle = "#b9ced6";
      roundedRect(p.x - 7, p.y - 8, 14, 16, 4);
      ctx.fillStyle = "#f7fdff";
      roundedRect(p.x - 6, p.y - 9, 12, 7, 3);
      roundedRect(p.x - 8, p.y - 3, 16, 12, 5);
      ctx.fillStyle = "#70cde8";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 2 + pulse * 1.5, 5 + pulse * 1.8, 3 + pulse, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.type === "sink") {
      ctx.fillStyle = "#5aa5bd";
      roundedRect(p.x - 8, p.y - 5, 16, 12, 4);
      ctx.fillStyle = "#d8fbff";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - 2, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#4386a4";
      ctx.fillRect(p.x - 2, p.y - 8, 4, 4);
    } else if (t.type === "paper") {
      ctx.fillStyle = "#b59e68";
      roundedRect(p.x - 8, p.y - 8, 16, 16, 4);
      ctx.fillStyle = "#fff8d8";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 7, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.type === "plunger") {
      ctx.fillStyle = "#8b503e";
      roundedRect(p.x - 2, p.y - 10 - pulse * 4, 4, 15 + pulse * 5, 2);
      ctx.fillStyle = "#d33636";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 4, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 被弾フラッシュ
  if (hit > 0) {
    ctx.fillStyle = `rgba(255, 80, 80, ${hit * 0.5})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fill();
  }

  // ★ 移動直後クールダウン（リング＋うっすら暗幕＋テキスト）
  if (t.moveLockT && t.moveLockT > 0 && t.moveLockMax) {
    const r = t.moveLockT / t.moveLockMax;
    // 暗幕
    ctx.save();
    ctx.fillStyle = `rgba(8,12,18,${0.35 * r})`;
    ctx.fillRect(t.tx * TILE, PLAY_TOP + t.ty * TILE, TILE, TILE);
    // 円形ゲージ
    ctx.strokeStyle = "rgba(255,216,107,0.85)";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(p.x, p.y - 2, 8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * r);
    ctx.stroke();
    // 中心ドット
    ctx.fillStyle = "rgba(255,216,107,0.85)";
    ctx.beginPath();
    ctx.arc(p.x, p.y - 2, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ★ 塔のHPバー（味方は壊れるよ）
  if (t.tx != null && t.maxHp != null && t.hp < t.maxHp) {
    const bw = 14;
    const ratio = Math.max(0, t.hp / t.maxHp);
    ctx.fillStyle = "#1a0a0a";
    ctx.fillRect(p.x - bw/2, p.y - 13, bw, 2);
    ctx.fillStyle = ratio > 0.5 ? "#62e58b" : ratio > 0.25 ? "#ffcf52" : "#ff6652";
    ctx.fillRect(p.x - bw/2, p.y - 13, bw * ratio, 2);
  }

  // ひび割れ表現（HP25%以下）
  if (t.tx != null && t.hp < t.maxHp * 0.25) {
    ctx.strokeStyle = "rgba(20,10,5,0.7)";
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(p.x - 4, p.y - 4); ctx.lineTo(p.x - 1, p.y); ctx.lineTo(p.x + 3, p.y - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x + 2, p.y + 5); ctx.lineTo(p.x - 1, p.y + 2);
    ctx.stroke();
  }
}

function drawPlacePreview() {
  if (game.mode !== "playing" || game.movingTower || !game.hover.on) return;
  const tx = game.hover.tx, ty = game.hover.ty;
  const occupied = !!towerAt(tx, ty);
  const onPath = pathTiles.has(ty * MAP_W + tx);
  const def = TOWER_DEFS[game.selected];
  const enoughCoin = game.coins >= def.cost;
  ctx.save();

  // 塔のあるマス：エラーじゃなく「クリックで持ち上げて移動」の青ハイライト
  if (occupied) {
    ctx.fillStyle = "rgba(120, 200, 255, 0.22)";
    ctx.fillRect(tx * TILE, PLAY_TOP + ty * TILE, TILE, TILE);
    ctx.strokeStyle = "rgba(140, 220, 255, 0.95)";
    ctx.setLineDash([3, 2]);
    ctx.lineWidth = 1;
    ctx.strokeRect(tx * TILE + 0.5, PLAY_TOP + ty * TILE + 0.5, TILE - 1, TILE - 1);
    ctx.setLineDash([]);
    // ヒント
    ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textBaseline = "bottom";
    ctx.textAlign = "center";
    ctx.lineWidth = 3; ctx.strokeStyle = "#0c0e12";
    ctx.strokeText("クリックで移動", tx * TILE + TILE/2, PLAY_TOP + ty * TILE - 1);
    ctx.fillStyle = "#bce3ff";
    ctx.fillText("クリックで移動", tx * TILE + TILE/2, PLAY_TOP + ty * TILE - 1);
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.restore();
    return;
  }

  const ok = !onPath && enoughCoin;
  ctx.fillStyle = ok ? "rgba(110,240,139,0.22)" : "rgba(255,80,70,0.22)";
  ctx.fillRect(tx * TILE, PLAY_TOP + ty * TILE, TILE, TILE);
  ctx.strokeStyle = ok ? "rgba(127,255,166,0.95)" : "rgba(255,122,107,0.9)";
  ctx.lineWidth = 1;
  ctx.strokeRect(tx * TILE + 0.5, PLAY_TOP + ty * TILE + 0.5, TILE - 1, TILE - 1);
  if (ok) {
    const cx = tx * TILE + TILE/2, cy = PLAY_TOP + ty * TILE + TILE/2;
    if (def.range) {
      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.beginPath(); ctx.arc(cx, cy, def.range, 0, Math.PI * 2); ctx.stroke();
    } else if (def.radius) {
      ctx.strokeStyle = "rgba(255,248,216,0.32)";
      ctx.beginPath(); ctx.arc(cx, cy, def.radius * TILE, 0, Math.PI * 2); ctx.stroke();
    }
  } else {
    let reason = "";
    if (onPath) reason = "通路";
    else if (!enoughCoin) reason = `${def.cost - game.coins}C不足`;
    if (reason) {
      ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
      ctx.textBaseline = "bottom";
      ctx.textAlign = "center";
      ctx.lineWidth = 3; ctx.strokeStyle = "#0c0e12";
      ctx.strokeText(reason, tx * TILE + TILE/2, PLAY_TOP + ty * TILE - 1);
      ctx.fillStyle = "#ffb59a";
      ctx.fillText(reason, tx * TILE + TILE/2, PLAY_TOP + ty * TILE - 1);
      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    }
  }
  ctx.restore();
}
function drawMovePreview() {
  const t = game.movingTower;
  if (!t || !game.hover.on) return;
  const tx = game.hover.tx, ty = game.hover.ty;
  const occupied = towerAt(tx, ty) && towerAt(tx, ty) !== t;
  const onPath = pathTiles.has(ty * MAP_W + tx);
  const ok = !occupied && !onPath;
  ctx.save();
  ctx.fillStyle = ok ? "rgba(110, 240, 139, 0.28)" : "rgba(255, 90, 80, 0.30)";
  ctx.fillRect(tx * TILE, PLAY_TOP + ty * TILE, TILE, TILE);
  ctx.strokeStyle = ok ? "#7fffa6" : "#ff7a6b";
  ctx.lineWidth = 1;
  ctx.strokeRect(tx * TILE + 0.5, PLAY_TOP + ty * TILE + 0.5, TILE - 1, TILE - 1);
  if (ok) {
    const cx = tx * TILE + TILE/2, cy = PLAY_TOP + ty * TILE + TILE/2;
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(t.cx, t.cy); ctx.lineTo(cx, cy);
    ctx.stroke();
    ctx.setLineDash([]);
    if (t.def.range) {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
      ctx.beginPath(); ctx.arc(cx, cy, t.def.range, 0, Math.PI * 2); ctx.stroke();
    }
  }
  ctx.restore();
}

// 紙タワーの常時射程リング（清掃範囲を可視化）
function drawPaperRangeRings() {
  for (const t of game.towers) {
    if (t.type !== "paper" || t.hp <= 0) continue;
    const r = t.def.radius * TILE;
    // 外側：薄い金色のリング（常時表示）
    ctx.save();
    ctx.strokeStyle = "rgba(255, 248, 216, 0.32)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(t.cx, t.cy, r, 0, Math.PI * 2); ctx.stroke();
    // 内側：脈動する薄い光（清掃中アピール）
    const pulse = (Math.sin(performance.now()/240 + t.cx*0.01) + 1) / 2;
    ctx.strokeStyle = `rgba(255, 248, 216, ${0.12 + pulse * 0.10})`;
    ctx.beginPath(); ctx.arc(t.cx, t.cy, r * (0.55 + pulse * 0.30), 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}
// 清掃されたタイルを白光で点滅させる
function drawCleanTileFx() {
  if (!game.cleanFx || game.cleanFx.length === 0) return;
  ctx.save();
  for (const f of game.cleanFx) {
    const k = Math.max(0, f.life / f.max);
    ctx.fillStyle = `rgba(255, 252, 220, ${0.45 * k})`;
    ctx.fillRect(f.tx * TILE, PLAY_TOP + f.ty * TILE, TILE, TILE);
    ctx.strokeStyle = `rgba(255, 240, 180, ${0.85 * k})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(f.tx * TILE + 0.5, PLAY_TOP + f.ty * TILE + 0.5, TILE - 1, TILE - 1);
  }
  ctx.restore();
}

function drawTowerAttackMotion(t, origin, pulse) {
  const angle = Math.atan2((t.aimY || origin.y) - origin.y, (t.aimX || origin.x) - origin.x);
  ctx.save();
  ctx.globalAlpha = 0.25 + pulse * 0.45;
  if (t.type === "toilet") {
    ctx.strokeStyle = "#8ce8ff";
    ctx.lineWidth = 2 + pulse * 2;
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(origin.x + Math.cos(angle) * 24, origin.y + Math.sin(angle) * 24);
    ctx.stroke();
  } else if (t.type === "sink") {
    ctx.strokeStyle = "#baf8ff";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(origin.x, origin.y, 15 + pulse * 19, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(origin.x, origin.y, 7 + pulse * 13, 0, Math.PI * 2); ctx.stroke();
  } else if (t.type === "paper") {
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(origin.x, origin.y, 12 + pulse * 33, 0, Math.PI * 2); ctx.stroke();
  } else if (t.type === "plunger") {
    ctx.fillStyle = "#ff8066";
    ctx.translate(origin.x, origin.y);
    ctx.rotate(angle);
    roundedRect(2, -3, 20 + pulse * 14, 6, 3);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  const snared = (e.snareT && e.snareT > 0);
  const walk = snared ? 0 : Math.sin(e.wobble);
  const x = e.x + (snared ? 0 : Math.sin(e.wobble * 0.7) * (e.type === "roach" ? 1.4 : 0.8));
  const y = e.y + (snared ? 0 : walk * (e.type === "child" ? 1.4 : 0.7));
  const size = e.def.size;

  // 縛られている敵：周囲に紙のリボン（白い帯）をぐるぐる
  if (snared) {
    const t = performance.now() / 220;
    ctx.save();
    ctx.strokeStyle = "rgba(255, 248, 216, 0.95)";
    ctx.lineWidth = 1.6;
    for (let i = 0; i < 3; i++) {
      const phase = t + i * (Math.PI * 2 / 3);
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 2; a += 0.25) {
        const r1 = size + 2 + Math.sin(a * 3 + phase) * 2.2;
        const px = x + Math.cos(a) * r1, py = y + Math.sin(a) * r1 * 0.7;
        if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
    }
    // 紙の細片
    ctx.fillStyle = "rgba(255, 240, 200, 0.55)";
    for (let i = 0; i < 5; i++) {
      const a = t + i * 1.3;
      ctx.fillRect(x + Math.cos(a) * (size + 4) - 1, y + Math.sin(a) * (size + 3) - 1, 2, 2);
    }
    ctx.restore();
  }

  // ★ ボスのダメージオーラ：赤いパルス円（auraR が表示半径）
  if (e.def && e.def.boss && e.def.auraR) {
    const pulse = (Math.sin(performance.now() / 220) + 1) / 2;
    const r = e.def.auraR;
    ctx.save();
    ctx.fillStyle = `rgba(220, 40, 40, ${0.10 + pulse * 0.10})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(255, 90, 70, ${0.55 + pulse * 0.35})`;
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
    // 内側の細い線でオーラ感
    ctx.strokeStyle = `rgba(255, 200, 120, ${0.30 + pulse * 0.30})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, r * 0.55, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
  ctx.beginPath();
  ctx.ellipse(x, e.y + size - 1, size + 1, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  if (e.hp < e.maxHp) {
    const bw = (e.def && e.def.boss) ? 24 : 16;
    ctx.fillStyle = "#2a1712";
    ctx.fillRect(x - bw / 2, y - size - 6, bw, 2);
    const ratio = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = ratio > 0.5 ? "#6ef08b" : ratio > 0.25 ? "#ffcf52" : "#ff6652";
    ctx.fillRect(x - bw / 2, y - size - 6, bw * ratio, 2);
  }

  if (e.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${e.hitFlash * 0.65})`;
    ctx.beginPath();
    ctx.arc(x, y, size + 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // ボディ: スプライト優先（歩行コマを wobble で 0/1 切り替え）、なければ手描き
  const frame = (Math.floor(e.wobble * 1.5) % 2);
  const drew = drawSpriteFrame(e.type, frame, x, y);
  if (!drew) {
    if (e.type === "roach") {
      ctx.fillStyle = "#0f0b08";
      ctx.beginPath(); ctx.ellipse(x, y, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#6b3c1f";
      ctx.beginPath(); ctx.ellipse(x, y, 3, 6, 0, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === "poop") {
      ctx.fillStyle = "#4d2918";
      ctx.beginPath(); ctx.ellipse(x, y + 4, 8 + Math.abs(walk), 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#7a421e";
      ctx.beginPath();
      ctx.ellipse(x, y + 1, 7, 5 + Math.abs(walk * 0.5), 0, 0, Math.PI * 2);
      ctx.ellipse(x, y - 4, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === "child") {
      ctx.fillStyle = "#ffd09a";
      ctx.beginPath(); ctx.arc(x, y - 7, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4d7edb";
      roundedRect(x - 5, y - 3, 10, 11, 4);
    } else if (e.def && e.def.boss) {
      const baseC = e.type === "poopking" ? "#5a3015" : e.type === "bratboss" ? "#3a4a1a" : "#4a2317";
      ctx.fillStyle = baseC;
      ctx.beginPath(); ctx.ellipse(x, y, 13, 10 + Math.abs(walk), 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#12100f";
      roundedRect(x - 8, y - 12, 16, 7, 3);
    }
  }

  if (e.slowMul < 0.95) {
    ctx.fillStyle = "rgba(120,200,255,0.85)";
    ctx.beginPath();
    ctx.ellipse(x, e.y + size + 1, 4, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawShot(s) {
  const k = 1 - Math.min(1, s.life / (s.lifeMax || 0.3));
  const x = s.x + (s.tx - s.x) * k;
  const y = s.y + (s.ty - s.y) * k;
  const angle = Math.atan2(s.ty - s.y, s.tx - s.x);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  if (s.kind === "toilet") {
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
    ctx.beginPath(); ctx.ellipse(0, 0, 6, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#79ddff";
    ctx.beginPath(); ctx.ellipse(1, 0, 4, 2, 0, 0, Math.PI * 2); ctx.fill();
  } else if (s.kind === "plunger") {
    ctx.fillStyle = "#ff8066";
    roundedRect(-2, -3, 10, 6, 3);
    ctx.fillStyle = "#8b503e";
    ctx.fillRect(-8, -1, 8, 2);
  } else {
    ctx.fillStyle = s.color;
    ctx.fillRect(-2, -2, 4, 4);
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of game.particles) {
    const a = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = a;
    if (p.text) {
      // テキストパーティクル（数字ポップ）
      ctx.font = `900 ${p.size}px "Yu Gothic UI", Meiryo, sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.lineWidth = 3; ctx.strokeStyle = "#0c0e12";
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y);
      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
  }
  ctx.globalAlpha = 1;
}

// 小さなコイン絵（英字代わりに使用）
function kt(x, y) {
  ctx.fillStyle = "#7b4c13";
  ctx.fillRect(Math.round(x) - 4, Math.round(y) - 5, 8, 10);
  ctx.fillStyle = "#ffd861";
  ctx.fillRect(Math.round(x) - 3, Math.round(y) - 4, 6, 8);
  ctx.fillStyle = "#fff1a6";
  ctx.fillRect(Math.round(x) - 1, Math.round(y) - 3, 2, 6);
}

function drawTopHUD() {
  ctx.fillStyle = "#1b2028";
  ctx.fillRect(0, 0, W, PLAY_TOP);
  ctx.fillStyle = "#3a1610";
  ctx.fillRect(4, 4, 56, 6);
  const hpRatio = Math.max(0, game.hp / 20);
  ctx.fillStyle = hpRatio > 0.6 ? "#62e58b" : hpRatio > 0.3 ? "#ffcf52" : "#ff6652";
  ctx.fillRect(5, 5, 54 * hpRatio, 4);

  const cleanLevel = Math.max(0, game.hp);
  const cleanColor = cleanLevel > 12 ? "#b8f2ad" : cleanLevel > 6 ? "#ffcc66" : "#ff6b58";
  text(`清潔度${cleanLevel}`, 56, 8, cleanColor, 9);
  kt(106, 8);
  text(`${game.coins}`, 116, 8, "#ffd86b", 10);
  text(`第${game.stage}幕`, 150, 8, "#ffffff", 9);
  text(`経過${(game.stageT||0).toFixed(0)}秒`, 192, 8, "#fff", 9);

function drawBottomHUD() {
  ctx.fillStyle = "#101319";
  ctx.fillRect(0, PLAY_BOTTOM, W, H - PLAY_BOTTOM);
  for (let i = 0; i < 4; i++) {
    const x = i * 80;
    const def = TOWER_DEFS[TOWER_KEYS[i]];
    const sel = game.selected === TOWER_KEYS[i];
    ctx.fillStyle = sel ? "#edf6ff" : "#3b3f4a";
    roundedRect(x + 4, PLAY_BOTTOM + 3, 72, 26, 4);
    drawTower({ type: TOWER_KEYS[i], def, cx: x + 16, cy: PLAY_BOTTOM + 16, attackFlash: 0, bob: 0 });
    const fg = sel ? "#111820" : "#f7f0dc";
    const cc = sel ? "#4b2600" : "#ffd86b";
    tinyText(`${i+1} ${def.name}`, x + 28, PLAY_BOTTOM + 11, fg);
    tinyText(`${def.cost}`, x + 28, PLAY_BOTTOM + 22, game.coins >= def.cost ? cc : "#888");
  }
}

function drawCrisisEffects() {
  if (game.mode !== "playing") return;
  const hpRatio = Math.max(0, Math.min(1, game.hp / 20));
  const ac = avgContam() / 100;
  const bossAlive = game.enemies.some(e => e.def && e.def.boss && e.hp > 0);
  // 危機度（0〜1+）
  const danger = Math.max(1 - hpRatio, ac, bossAlive ? 0.5 : 0);
  if (danger <= 0.08) return;

  const tt = game.t;
  const pulse = (Math.sin(tt * (5 + danger * 8)) + 1) / 2;

  // 縁の赤脈動
  const edge = Math.round(4 + danger * 22);
  const aEdge = Math.min(0.85, (0.18 + pulse * 0.45) * danger);
  ctx.fillStyle = `rgba(220, 28, 28, ${aEdge})`;
  ctx.fillRect(0, PLAY_TOP, W, edge);
  ctx.fillRect(0, PLAY_BOTTOM - edge, W, edge);
  ctx.fillRect(0, PLAY_TOP, edge, PLAY_BOTTOM - PLAY_TOP);
  ctx.fillRect(W - edge, PLAY_TOP, edge, PLAY_BOTTOM - PLAY_TOP);

  // 汚染寄りなら茶色の脈動も足す
  if (ac > 0.35) {
    const a2 = (ac - 0.35) * 0.55;
    ctx.fillStyle = `rgba(92, 45, 24, ${a2 * (0.4 + pulse * 0.5)})`;
    const e2 = Math.round(2 + ac * 14);
    ctx.fillRect(0, PLAY_TOP, W, e2);
    ctx.fillRect(0, PLAY_BOTTOM - e2, W, e2);
  }

  // 全体うっすら赤味（HP30%以下や汚染60%以上で）
  if (danger > 0.5) {
    ctx.fillStyle = `rgba(160, 14, 14, ${(danger - 0.5) * 0.18})`;
    ctx.fillRect(0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  }

  // 走査線ノイズ（ボス降臨中／重ピンチ）
  if (bossAlive || danger > 0.7) {
    ctx.strokeStyle = `rgba(255,80,80,${0.10 + pulse * 0.10})`;
    ctx.lineWidth = 1;
    for (let yy = PLAY_TOP + ((tt * 60) | 0) % 4; yy < PLAY_BOTTOM; yy += 4) {
      ctx.beginPath(); ctx.moveTo(0, yy + 0.5); ctx.lineTo(W, yy + 0.5); ctx.stroke();
    }
  }

  // ボス警告テロップ
  if (bossAlive) {
    ctx.font = `800 12px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,0.95)";
    const wlabel = "⚠ 汚染の主 接近中 ⚠";
    ctx.strokeText(wlabel, W/2, PLAY_TOP + 4);
    ctx.fillStyle = `rgba(255, ${60 + pulse*60}, 30, ${0.65 + pulse * 0.35})`;
    ctx.fillText(wlabel, W/2, PLAY_TOP + 4);
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  }
}

function drawBossIntro() {
  if (!game.bossIntroT || game.bossIntroT <= 0) return;
  const r = game.bossIntroT / Math.max(0.001, game.bossIntroMax || 1);  // 1→0
  const inP = Math.min(1, (1 - r) * 3);          // 入りは速く
  const outP = Math.min(1, r * 3);               // 抜けはフェード
  const a = Math.min(inP, outP);
  // 黒帯：上下から押し寄せる
  const bandH = (1 - r) * 38;
  ctx.fillStyle = `rgba(8,4,4,${0.8 * a})`;
  ctx.fillRect(0, PLAY_TOP, W, bandH);
  ctx.fillRect(0, PLAY_BOTTOM - bandH, W, bandH);
  // 中央のドカン
  const cx = W / 2, cy = (PLAY_TOP + PLAY_BOTTOM) / 2;
  // 赤い後光
  const radius = 30 + (1 - r) * 80;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, `rgba(220,20,20,${0.55 * a})`);
  grad.addColorStop(0.6, `rgba(120,10,10,${0.25 * a})`);
  grad.addColorStop(1, `rgba(0,0,0,0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  // メインタイトル
  ctx.font = `900 22px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 6;
  const jitter = (1 - r) * 1.5;
  const jx = (Math.random() - 0.5) * jitter;
  const jy = (Math.random() - 0.5) * jitter;
  const introName = (game.bossIntroName || "汚染の主") + " 降臨";
  ctx.strokeStyle = `rgba(0,0,0,${a})`;
  ctx.strokeText(introName, cx + jx, cy - 4 + jy);
  ctx.fillStyle = `rgba(255,${40 + 30 * (1-r)},${30 + 20 * (1-r)},${a})`;
  ctx.fillText(introName, cx + jx, cy - 4 + jy);
  // サブテキスト
  ctx.font = `700 10px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.lineWidth = 3;
  ctx.strokeStyle = `rgba(0,0,0,${a})`;
  const introHp = game.bossIntroType === "bratboss" ? "240" : game.bossIntroType === "poopking" ? "520" : "360";
  const sub = `経路：${game.bossIntroPath === 0 ? "上ライン" : "下ライン"} / HP${introHp} / 通過攻撃 ×激重`;
  ctx.strokeText(sub, cx, cy + 16);
  ctx.fillStyle = `rgba(255,210,80,${a})`;
  ctx.fillText(sub, cx, cy + 16);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function drawBossKill() {
  if (!game.bossKillT || game.bossKillT <= 0) return;
  const r = game.bossKillT / Math.max(0.001, game.bossKillMax || 1);
  const inP = Math.min(1, (1 - r) * 4);
  const outP = Math.min(1, r * 2.2);
  const a = Math.min(inP, outP);
  // 白〜金色フラッシュ
  ctx.fillStyle = `rgba(255, 248, 200, ${0.45 * a})`;
  ctx.fillRect(0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  // 中央に拡大する光輪
  const cx = W / 2, cy = (PLAY_TOP + PLAY_BOTTOM) / 2;
  const ringR = 10 + (1 - r) * 130;
  ctx.strokeStyle = `rgba(255, 230, 120, ${0.85 * a})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.6 * a})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, ringR + 6, 0, Math.PI * 2); ctx.stroke();
  // 中央テキスト
  const scale = 1 + (1 - r) * 0.25;
  const fs = Math.round(26 * scale);
  ctx.font = `900 ${fs}px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.lineWidth = 6;
  ctx.strokeStyle = `rgba(40, 20, 0, ${a})`;
  ctx.strokeText("撃破", cx, cy - 4);
  ctx.fillStyle = `rgba(255, 240, 180, ${a})`;
  ctx.fillText("撃破", cx, cy - 4);
  // サブ
  ctx.font = `800 11px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.lineWidth = 4;
  ctx.strokeStyle = `rgba(0,0,0,${a})`;
  const subKill = `${game.bossKillName || "汚染の主"}、流された。`;
  ctx.strokeText(subKill, cx, cy + 22);
  ctx.fillStyle = `rgba(184, 242, 173, ${a})`;
  ctx.fillText(subKill, cx, cy + 22);
  // 床に光柱
  ctx.fillStyle = `rgba(255, 240, 180, ${0.18 * a})`;
  ctx.fillRect(cx - 30, PLAY_TOP, 60, PLAY_BOTTOM - PLAY_TOP);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function drawStoryBanner() {
  if (game.storyT <= 0 || game.mode !== "playing") return;
  const t = game.storyT, m = game.storyMax;
  const fadeIn = Math.min(1, (m - t) / 0.4);
  const fadeOut = Math.min(1, t / 0.6);
  const alpha = Math.min(fadeIn, fadeOut);
  if (alpha <= 0) return;
  const s = game.story || { speaker:"", text:"" };
  const speaker = s.speaker || "";
  const text = s.text || "";

  // 細めの帯を画面下端寄りに配置（プレイ視界をなるべく潰さない）
  const boxX = 6, boxY = PLAY_BOTTOM - 38, boxW = W - 12, boxH = 32;
  // 背景は薄い帯のみ（ほぼ透過）。文字側の輪郭で可読性を担保。
  const grad = ctx.createLinearGradient(0, boxY, 0, boxY + boxH);
  grad.addColorStop(0, `rgba(8,12,18,${alpha * 0.10})`);
  grad.addColorStop(0.5, `rgba(8,12,18,${alpha * 0.34})`);
  grad.addColorStop(1, `rgba(8,12,18,${alpha * 0.10})`);
  ctx.fillStyle = grad;
  ctx.fillRect(boxX, boxY, boxW, boxH);
  // 上下の細い金線だけ残す
  ctx.strokeStyle = `rgba(255,216,107,${alpha * 0.65})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(boxX, boxY + 0.5); ctx.lineTo(boxX + boxW, boxY + 0.5);
  ctx.moveTo(boxX, boxY + boxH - 0.5); ctx.lineTo(boxX + boxW, boxY + boxH - 0.5);
  ctx.stroke();

  // スピーカー名タグ（背景は塗って可読性）
  if (speaker) {
    ctx.font = `700 9px "Yu Gothic UI", Meiryo, sans-serif`;
    const tagW = Math.ceil(ctx.measureText(speaker).width) + 12;
    ctx.fillStyle = `rgba(80,38,18,${alpha * 0.95})`;
    ctx.fillRect(boxX + 4, boxY - 7, tagW, 12);
    ctx.strokeStyle = `rgba(255,216,107,${alpha})`;
    ctx.strokeRect(boxX + 4.5, boxY - 6.5, tagW - 1, 11);
    ctx.fillStyle = `rgba(255,216,107,${alpha})`;
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(speaker, boxX + 10, boxY - 1);
  }

  // 本文（2行折り返し・強い輪郭で透過背景でも読める）
  const lines = wrapJP(text, 28);
  ctx.font = `800 11px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  for (let i = 0; i < Math.min(2, lines.length); i++) {
    const ly = boxY + 10 + i * 13;
    ctx.lineWidth = 4;
    ctx.strokeStyle = `rgba(0,0,0,${Math.min(1, alpha * 1.1)})`;
    ctx.strokeText(lines[i], boxX + 8, ly);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(lines[i], boxX + 8, ly);
  }

  // ▼進行マーカー
  const blink = (Math.sin(performance.now() / 200) + 1) / 2;
  ctx.fillStyle = `rgba(184,242,173,${alpha * (0.4 + blink * 0.6)})`;
  ctx.font = `700 9px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textAlign = "right";
  ctx.fillText("▼", boxX + boxW - 6, boxY + boxH - 5);
  ctx.textAlign = "left";
}
function wrapJP(s, n) {
  const out = [];
  let cur = "";
  for (const ch of s) {
    cur += ch;
    if (cur.length >= n || "、。！？」".includes(ch)) {
      out.push(cur); cur = "";
      if (out.length >= 2) break;
    }
  }
  if (cur && out.length < 2) out.push(cur);
  return out;
}

function drawTitleOverlay() {
  // 完全不透明な背景：state_0(ピカピカ)があればそれをうっすら、無ければ単色。HUD/プレイ画面は描画しない。
  ctx.fillStyle = "#070a10";
  ctx.fillRect(0, 0, W, H);
  if (BG_STATES[0] && BG_STATES[0].complete && BG_STATES[0].naturalWidth > 0) {
    ctx.globalAlpha = 0.32;
    ctx.drawImage(BG_STATES[0], 0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, W, H);

  centerText("トイレ防衛隊", 18, "#ffffff", 18);
  centerText("清潔圏崩壊", 32, "#ffd86b", 11);
  centerText(STORY.title_sub1, 48, "#cfd6df", 8);
  centerText(STORY.title_sub2, 60, "#cfd6df", 8);

  // ─── 塔の役割カード（2×2）──────────────────
  const cards = [
    { key:"toilet",  role:"単体攻撃",     desc:"水しぶき・威力強め" },
    { key:"sink",    role:"範囲減速",     desc:"近くの敵を半分の速さに" },
    { key:"paper",   role:"敵を縛る",     desc:"範囲内の敵をその場で停止" },
    { key:"plunger", role:"近距・押戻",   desc:"近づく敵を押し戻す" },
  ];
  const gx = 6, gy = 76, cw = 154, ch = 40, gap = 4;
  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = (i / 2) | 0;
    const x = gx + col * (cw + gap);
    const y = gy + row * (ch + gap);
    // 枠
    ctx.fillStyle = "rgba(18,24,34,0.94)";
    ctx.fillRect(x, y, cw, ch);
    ctx.strokeStyle = "rgba(255,216,107,0.85)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, cw - 1, ch - 1);
    // ホットキー番号
    ctx.fillStyle = "rgba(255,216,107,1)";
    ctx.font = `800 8px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText(`${i + 1}`, x + 3, y + 3);
    // スプライト（左寄り、底揃え）
    drawSpriteFrame(cards[i].key, 0, x + 18, y + ch - 3, 1.05);
    // 名前 + コスト
    const def = TOWER_DEFS[cards[i].key];
    ctx.font = `800 10px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.lineWidth = 3; ctx.strokeStyle = "#0c0e12";
    // 名前のみ太字で表示。コストはコインピクト＋数字（英字なし）
    ctx.strokeText(def.name, x + 36, y + 4);
    ctx.fillStyle = "#ffd86b";
    ctx.fillText(def.name, x + 36, y + 4);
    const nameW = Math.ceil(ctx.measureText(def.name).width);
    kt(x + 36 + nameW + 12, y + 9);
    ctx.font = `800 10px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.lineWidth = 3; ctx.strokeStyle = "#0c0e12";
    ctx.strokeText(`${def.cost}`, x + 36 + nameW + 20, y + 4);
    ctx.fillStyle = "#ffd86b";
    ctx.fillText(`${def.cost}`, x + 36 + nameW + 20, y + 4);
    // 役割
    ctx.font = `700 9px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.lineWidth = 2; ctx.strokeStyle = "#0c0e12";
    ctx.strokeText(cards[i].role, x + 36, y + 17);
    ctx.fillStyle = "#b8f2ad";
    ctx.fillText(cards[i].role, x + 36, y + 17);
    // 詳細スペック
    ctx.font = `600 8px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.lineWidth = 2; ctx.strokeStyle = "#0c0e12";
    ctx.strokeText(cards[i].desc, x + 36, y + 28);
    ctx.fillStyle = "#cfd6df";
    ctx.fillText(cards[i].desc, x + 36, y + 28);
  }
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

  // 操作説明（カードの下に余白を取り、英字を排除）
  centerText("床マスをクリックで設置／１〜４でタワー切替", 174, "#dde3ec", 9);
  centerText("塔をクリック→空きマスへ移動（約２秒停止）", 187, "#9aa3ad", 8);
  centerText("取消はエスケープ／やり直しはＲキー", 198, "#9aa3ad", 8);

  // 点滅する着任テキスト
  const blink = (Math.sin(performance.now() / 380) + 1) / 2;
  centerText(STORY.title_cta, 218, `rgba(255, 215, 100, ${0.4 + blink * 0.6})`, 12);
  if (SPRITE_LOAD_FAILED_REASON) {
    centerText(SPRITE_LOAD_FAILED_REASON, H - 4, "#ff9d6b", 8);
  }
}

// drawEndOverlay は廃止（kamishibai_end が紙芝居エンディングを担当）

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function drawLoadingScreen() {
  ctx.fillStyle = "#0c0e12";
  ctx.fillRect(0, 0, W, H);
  centerText("読み込み中…", H/2 - 6, "#ffd86b", 14);
  centerText("（グラフィックを準備）", H/2 + 14, "#bbb", 10);
}

(async function boot() {
  try {
    drawLoadingScreen();
    // 描画反映を1tick待つ。rAFはheadlessで発火しないことがあるので setTimeout に
    await new Promise(r => setTimeout(r, 16));
    // 3秒タイムアウト：何があってもタイトルへ抜ける（読み込み画面で固まらない）
    await Promise.race([
      loadAllSprites(),
      new Promise((_, rej) => setTimeout(() => rej(new Error("load timeout 3s")), 3000)),
    ]).catch(e => {
      console.warn("[boot] asset load issue:", e && e.message);
      SPRITE_LOAD_FAILED_REASON = SPRITE_LOAD_FAILED_REASON || ("読み込み一部失敗: " + (e && e.message || e));
    });
  } catch (e) {
    console.error("[boot] fatal:", e);
    SPRITE_LOAD_FAILED_REASON = "起動エラー: " + (e && e.message || e);
  }
  newGame();
  lastT = performance.now();
  requestAnimationFrame(loop);
})();
    </script>
