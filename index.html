"use strict";

// ============================================================
// トイレ防衛隊：清潔圏崩壊（半分手動版）
// 仕様: ../仕様.md
// 構成:
//   - 90秒1本勝負（Stage1 45秒 + Stage2 45秒）
//   - アップグレードなし（塔は単一スペックで簡単）
//   - 塔も HP を持ち、敵の通過攻撃で壊れる
//   - タイトル / 物語バナー / 結果画面でストーリー演出
//   - グラフィックは CODEX版から移植

const TILE = 16;
const MAP_W = 20;
const PLAY_TOP = 16;
const PLAY_BOTTOM = 208;
const PLAY_H_TILES = (PLAY_BOTTOM - PLAY_TOP) / TILE;

// ---------- 道（ステージごとに切り替わる） ----------

// Stage2: 瓦礫のせいで通路が崩壊→ジグザグ化（より曲がる＝塔配置の戦略性UP）

    [{tx:19,ty:10},{tx:15,ty:10},{tx:15,ty:7},{tx:10,ty:7},{tx:10,ty:10},{tx:5,ty:10},{tx:5,ty:7},{tx:0,ty:7}],
  ],
  3: [
    [{tx:19,ty:1},{tx:16,ty:1},{tx:16,ty:6},{tx:11,ty:6},{tx:11,ty:1},{tx:6,ty:1},{tx:6,ty:9},{tx:2,ty:9},{tx:2,ty:3},{tx:0,ty:3}],
    [{tx:19,ty:11},{tx:14,ty:11},{tx:14,ty:4},{tx:10,ty:4},{tx:10,ty:11},{tx:7,ty:11},{tx:7,ty:5},{tx:3,ty:5},{tx:3,ty:11},{tx:0,ty:11}],
  ],

// 各ステージの「後半」パス（中盤の「path会話」で切り替わる）
const PATHS_BY_STAGE_LATE = {
  1: [
    [{tx:19,ty:2},{tx:13,ty:2},{tx:13,ty:5},{tx:7,ty:5},{tx:7,ty:2},{tx:0,ty:2}],
    [{tx:19,ty:10},{tx:14,ty:10},{tx:14,ty:7},{tx:8,ty:7},{tx:8,ty:10},{tx:0,ty:10}],
  ],
  2: [
    [{tx:19,ty:1},{tx:14,ty:1},{tx:14,ty:4},{tx:10,ty:4},{tx:10,ty:1},{tx:5,ty:1},{tx:5,ty:4},{tx:2,ty:4},{tx:2,ty:1},{tx:0,ty:1}],
    [{tx:19,ty:11},{tx:13,ty:11},{tx:13,ty:8},{tx:9,ty:8},{tx:9,ty:11},{tx:5,ty:11},{tx:5,ty:8},{tx:0,ty:8}],
  ],
  3: [
    [{tx:19,ty:2},{tx:17,ty:2},{tx:17,ty:5},{tx:13,ty:5},{tx:13,ty:2},{tx:9,ty:2},{tx:9,ty:8},{tx:5,ty:8},{tx:5,ty:3},{tx:0,ty:3}],
    [{tx:19,ty:10},{tx:15,ty:10},{tx:15,ty:6},{tx:11,ty:6},{tx:11,ty:10},{tx:7,ty:10},{tx:7,ty:4},{tx:3,ty:4},{tx:3,ty:10},{tx:0,ty:10}],
  ],
};
// 互換のため
const PATHS_BY_STAGE = PATHS_BY_STAGE_EARLY;
let PATHS = PATHS_BY_STAGE_EARLY[1];
let pathTiles = new Set();
function rebuildPathTiles() {
  pathTiles = new Set();
  for (const PATH of PATHS) {
    for (let i = 0; i < PATH.length - 1; i++) {
      const a = PATH[i], b = PATH[i+1];
      if (a.tx === b.tx) {
        const lo = Math.min(a.ty, b.ty), hi = Math.max(a.ty, b.ty);
        for (let y = lo; y <= hi; y++) pathTiles.add(y * MAP_W + a.tx);
      } else {
        const lo = Math.min(a.tx, b.tx), hi = Math.max(a.tx, b.tx);
        for (let x = lo; x <= hi; x++) pathTiles.add(a.ty * MAP_W + x);
      }
    }
  }
}
function setStagePaths(stage, phase) {
  // phase: "early" (default) | "late"
  const src = phase === "late" ? PATHS_BY_STAGE_LATE : PATHS_BY_STAGE_EARLY;
  PATHS = src[stage] || src[1];
  rebuildPathTiles();
}
rebuildPathTiles();
function pathPx(idx) {
  return PATHS[idx].map(p => ({
    x: p.tx * TILE + TILE/2,
    y: PLAY_TOP + p.ty * TILE + TILE/2,
  }));
}

// ---------- 汚染グリッド ----------
const contam = new Float32Array(MAP_W * PLAY_H_TILES);
function getContam(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= PLAY_H_TILES) return 0;
  return contam[ty * MAP_W + tx];
}
function setContam(tx, ty, v) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= PLAY_H_TILES) return;
  contam[ty * MAP_W + tx] = Math.max(0, Math.min(100, v));
}
function avgContam() {
  let s = 0;
  for (let i = 0; i < contam.length; i++) s += contam[i];
  return s / contam.length;
}

// ---------- 塔データ（単一スペック） ----------
const TOWER_DEFS = {
  toilet:  { name: "便器",   desc: "詰まる前提",   color: "#e8f8ff", cost: 50, range: 56, dmg: 14, cd: 0.6, hp: 110 },
  sink:    { name: "洗面台", desc: "石鹸切れ",     color: "#9de7ff", cost: 60, range: 48, slow: 0.50, hp: 150 },
  // ペーパー：敵を紙で縛りつけて動きを止める（範囲拘束）。副次で汚染も削る。タフ

const TOWER_KEYS = ["toilet", "sink", "paper", "plunger"];

const ENEMY_DEFS = {

  // ボス：HPは高い（タンク）／攻撃力は控えめ（プレイヤーが立ち回りで凌げる）
  boss:     { name:"汚染の主",     hp: 1040, speed: 14, contam: 40, reward: 90, color:"#2a1820", size: 13,
              towerDmg: 6, auraR: 38, auraDps: 2.5, knockResist: 0.18,
              shootRange: 70, shootCd: 2.8, shootDmg: 5, shootColor:"#5a3e22", boss: true },
  bratboss: { name:"ガキ大将",     hp: 720, speed: 28, contam: 18, reward: 70, color:"#4a3618", size: 11,
              towerDmg: 5, auraR: 30, auraDps: 2.0, knockResist: 0.05,
              shootRange: 60, shootCd: 2.4, shootDmg: 4, shootColor:"#7c5526", boss: true },
  poopking: { name:"ウンチの王",   hp: 1520, speed: 11, contam: 60, reward: 110, color:"#3a1f10", size: 14,
              towerDmg: 7, auraR: 46, auraDps: 3.0, knockResist: 0.12,
              shootRange: 84, shootCd: 3.0, shootDmg: 6, shootColor:"#3a1f10", boss: true },
};

// ---------- スプライト定義（CODEX版の透過PNG群を直接利用：チロマキー不要） ----------
// 1キャラ = 4枚の独立PNG（_0〜_3）。`onerror` で別パスを順に試し、開発/dist/単体起動 すべてで通す。
const SPRITE_DIR_CANDIDATES = [
  "assets/sprites/",
  "./assets/sprites/",
  "../CODEX版/public/assets/generated/", // フォールバック
];
const BG_DIR_CANDIDATES = ["assets/sprites/", "../グラフィック/"];
const SPRITE_FRAMES = 4;
const SPRITES = {
  toilet:  { drawW: 30, drawH: 34, anchor: "bottom", attackFrame: 2, frames: [] },
  sink:    { drawW: 28, drawH: 32, anchor: "bottom", attackFrame: 2, frames: [] },
  paper:   { drawW: 24, drawH: 28, anchor: "bottom", attackFrame: 2, frames: [] },
  plunger: { drawW: 26, drawH: 30, anchor: "bottom", attackFrame: 2, frames: [] },
  roach:   { drawW: 24, drawH: 16, anchor: "center", attackFrame: 2, frames: [] },
  poop:    { drawW: 24, drawH: 22, anchor: "center", attackFrame: 2, frames: [] },
  child:   { drawW: 22, drawH: 28, anchor: "center", attackFrame: 2, frames: [] },
  boss:    { drawW: 42, drawH: 48, anchor: "center", attackFrame: 2, frames: [] },
  // 新ボス（シートから切り出したフレームをここに格納）
  bratboss:{ drawW: 30, drawH: 38, anchor: "center", attackFrame: 1, frames: [] },
  poopking:{ drawW: 44, drawH: 50, anchor: "center", attackFrame: 1, frames: [] },
};

// シート1枚を 4列×2行 = 8フレームの想定で 4フレームに切り出し（上段0..3を walk として使用）
// file:// だと getImageData が SecurityError を投げるので try/catch で緑背景のまま続行
function sliceSpriteSheet(img, cols, rows, useFrames) {
  const fw = Math.floor(img.naturalWidth / cols);
  const fh = Math.floor(img.naturalHeight / rows);
  const out = [];
  for (const f of useFrames) {
    const cx = f % cols, cy = Math.floor(f / cols);
    const cv = document.createElement("canvas");
    cv.width = fw; cv.height = fh;
    const g = cv.getContext("2d");
    g.imageSmoothingEnabled = false;
    g.drawImage(img, cx * fw, cy * fh, fw, fh, 0, 0, fw, fh);
    // 緑背景チロマキー（tainted canvas の場合は失敗するので緑のまま続行）
    try {
      const id = g.getImageData(0, 0, fw, fh);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], gv = d[i+1], b = d[i+2];
        if (gv > 130 && gv > r * 1.35 && gv > b * 1.35) {
          d[i+3] = 0;
        } else if (gv > 100 && gv > r * 1.12 && gv > b * 1.12) {
          const t = Math.min(1, (gv - 90) / 80);
          d[i+3] = Math.max(0, d[i+3] - 220 * t);
          d[i] = Math.min(255, d[i] + 6);
        }
      }
      g.putImageData(id, 0, 0);
    } catch (err) {
      // 高確率で SecurityError (file:// + 画像 → tainted canvas)
      console.warn("[chromaKey] skipped due to tainted canvas:", err.message);
    }
    out.push(cv);
  }
  return out;
}

let BG_STAGE1 = null, BG_STAGE2 = null;
let BG_STATES = [null, null, null, null]; // 0=ピカピカ / 1=普通 / 2=汚 / 3=崩壊
let PORTRAITS = { clean:null, rookie:null, brat:null, filth:null, king:null };
// 紙芝居用シーン画像（プロローグ13枚、エンディング3種×5枚）
let PROLOGUE_IMAGES = [];   // [scene_01..scene_NN]
let ENDING_IMAGES = { win:[], lose_hp:[], lose_contam:[] };
let SPRITE_LOAD_FAILED_REASON = "";

function loadImgFallback(candidates) {
  // 一つずつ試す。どれかが解決すれば返す。全滅したら null。
  return new Promise((resolve) => {
    const img = new Image();
    let i = 0;
    img.onload = () => resolve(img);
    img.onerror = () => {
      i += 1;
      if (i < candidates.length) img.src = candidates[i];
      else resolve(null);
    };
    img.src = candidates[0];
  });
}
function loadImg(src) { return loadImgFallback([src]); }

async function loadAllSprites() {
  const tasks = [];
  for (const [name, spec] of Object.entries(SPRITES)) {
    if (name === "bratboss" || name === "poopking") continue; // シート方式で別経路
    for (let i = 0; i < SPRITE_FRAMES; i++) {
      const cands = SPRITE_DIR_CANDIDATES.map(d => d + name + "_" + i + ".png");
      tasks.push(loadImgFallback(cands).then(im => { spec.frames[i] = im; }).catch(()=>{}));
    }
  }
  // 背景：5月8日生成の2枚（旧）。互換のため残す。
  const bg1 = BG_DIR_CANDIDATES.map(d => d + encodeURIComponent("ChatGPT Image 2026年5月8日 20_45_59 (1).png"));
  const bg2 = BG_DIR_CANDIDATES.map(d => d + encodeURIComponent("ChatGPT Image 2026年5月8日 20_45_59 (2).png"));
  tasks.push(loadImgFallback(bg1).then(im => { BG_STAGE1 = im; }).catch(()=>{}));
  tasks.push(loadImgFallback(bg2).then(im => { BG_STAGE2 = im; }).catch(()=>{}));
  // 動的BG：4状態（清潔→普通→汚→崩壊）
  for (let i = 0; i < 4; i++) {
    tasks.push(loadImgFallback([`assets/bg/state_${i}.png`, `./assets/bg/state_${i}.png`]).then(im => { BG_STATES[i] = im; }).catch(()=>{}));
  }
  // 会話用立ち絵（PILで緑抜き済）
  for (const k of ["clean", "rookie", "brat", "filth", "king"]) {
    tasks.push(loadImgFallback([`assets/portraits/port_${k}.png`, `./assets/portraits/port_${k}.png`]).then(im => { if (im) PORTRAITS[k] = im; }).catch(()=>{}));
  }
  // 紙芝居：プロローグ13枚（無いものは BG_STATES フォールバック）
  for (let i = 1; i <= 13; i++) {
    const idx = i - 1;
    const num = String(i).padStart(2, "0");
    tasks.push(loadImgFallback([
      `assets/prologue/scene_${num}.png`,
      `./assets/prologue/scene_${num}.png`,
      `../plorogue/scene_${num}.png`,    // ユーザー初期配置のフォールバック（typo）
    ]).then(im => { if (im) PROLOGUE_IMAGES[idx] = im; }).catch(()=>{}));
  }
  // 紙芝居：エンディング3種×5枚
  for (const kind of ["win", "lose_hp", "lose_contam"]) {
    ENDING_IMAGES[kind] = [];
    for (let i = 1; i <= 5; i++) {
      const idx = i - 1;
      const num = String(i).padStart(2, "0");
      tasks.push(loadImgFallback([
        `assets/ending/${kind}_${num}.png`,
        `./assets/ending/${kind}_${num}.png`,
        `../ending/${kind}_${num}.png`,
      ]).then(im => { if (im) ENDING_IMAGES[kind][idx] = im; }).catch(()=>{}));
    }
  }
  // 新ボスのシート（PILで緑抜き済みの _trans 優先、無ければ素のシート）
  tasks.push(loadImgFallback([
    "assets/sprites/bratboss_sheet_trans.png", "./assets/sprites/bratboss_sheet_trans.png",
    "assets/sprites/bratboss_sheet.png", "./assets/sprites/bratboss_sheet.png",
  ]).then(im => {
    try {
      if (im && im.naturalWidth > 0) SPRITES.bratboss.frames = sliceSpriteSheet(im, 4, 2, [0, 1, 2, 3]);
      // 会話用フレーム（怒り/泣きなど）も切る
      if (im && im.naturalWidth > 0) SPRITES.bratboss.portraits = sliceSpriteSheet(im, 4, 2, [0, 4, 5, 7]);
    } catch (e) { console.warn("[bratboss] slice failed:", e.message); }
  }).catch(()=>{}));
  tasks.push(loadImgFallback([
    "assets/sprites/poopking_sheet_trans.png", "./assets/sprites/poopking_sheet_trans.png",
    "assets/sprites/poopking_sheet.png", "./assets/sprites/poopking_sheet.png",
  ]).then(im => {
    try {
      if (im && im.naturalWidth > 0) SPRITES.poopking.frames = sliceSpriteSheet(im, 4, 2, [0, 1, 2, 3]);
      if (im && im.naturalWidth > 0) SPRITES.poopking.portraits = sliceSpriteSheet(im, 4, 2, [0, 2, 3, 7]);
    } catch (e) { console.warn("[poopking] slice failed:", e.message); }
  }).catch(()=>{}));

  await Promise.all(tasks);

  // 1枚も読めなかった場合のフォールバック告知
  const anySprite = Object.values(SPRITES).some(s => s.frames.some(f => f && f.naturalWidth > 0));
  if (!anySprite) {
    SPRITE_LOAD_FAILED_REASON = "スプライトが読めません。CODEX版/assets/generated/ を確認してください。";
  }
}

function drawSpriteFrame(type, frame, dx, dy, scale = 1) {
  const spec = SPRITES[type];
  if (!spec || !spec.frames || spec.frames.length === 0) return false;
  const f = spec.frames[Math.abs(frame|0) % spec.frames.length];
  if (!f) return false;
  if (f instanceof HTMLImageElement && (!f.complete || f.naturalWidth <= 0)) return false;
  const fw = f.naturalWidth || f.width;
  const fh = f.naturalHeight || f.height;
  if (!fw || !fh) return false;
  const maxW = spec.drawW * scale, maxH = spec.drawH * scale;
  const k = Math.min(maxW / fw, maxH / fh);
  const w = Math.max(1, Math.round(fw * k));
  const h = Math.max(1, Math.round(fh * k));
  const ax = Math.round(dx - w / 2);
  const ay = Math.round(spec.anchor === "bottom" ? dy - h : dy - h / 2);
  ctx.drawImage(f, ax, ay, w, h);
  return true;
}

// ───────── オーディオ：WebAudio による音楽合成＋SFX ─────────
let _audioStarted = false;
let audioCtx = null, masterGain = null, musicGain = null, sfxGain = null;
let _musicTrack = null, _musicTimer = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 0.55; masterGain.connect(audioCtx.destination);
    musicGain  = audioCtx.createGain(); musicGain.gain.value  = 0.45; musicGain.connect(masterGain);
    sfxGain    = audioCtx.createGain(); sfxGain.gain.value    = 0.85; sfxGain.connect(masterGain);
  } catch (e) { audioCtx = null; }
}

function _note(type, freq, t, dur, vol, dest) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(dest || sfxGain);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + Math.min(0.02, dur * 0.2));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}

function sfx(name) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  switch (name) {
    case "place":   _note("triangle", 440, t, 0.10, 0.35); _note("triangle", 660, t + 0.05, 0.12, 0.30); break;
    case "shoot":   _note("square", 900, t, 0.05, 0.15); break;
    case "splash":  _note("sawtooth", 320, t, 0.12, 0.18); _note("sine", 180, t, 0.18, 0.14); break;
    case "clean":   _note("sine", 1320, t, 0.08, 0.18); _note("sine", 1760, t + 0.04, 0.10, 0.14); break;
    case "knock":   _note("triangle", 240, t, 0.12, 0.25); break;
    case "kill":    _note("sawtooth", 220, t, 0.18, 0.25); _note("triangle", 100, t, 0.22, 0.18); break;
    case "hpLoss":  _note("sawtooth", 130, t, 0.45, 0.40); _note("triangle", 60, t, 0.50, 0.30); break;
    case "click":   _note("square", 1200, t, 0.04, 0.12); break;
    case "boss":    // 重低音ホーン
      _note("sawtooth", 55, t, 1.4, 0.55); _note("sawtooth", 82, t + 0.4, 1.0, 0.35); break;
    case "bossKill": // 勝鬨アルペジオ
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => _note("triangle", f, t + i * 0.10, 0.30, 0.35));
      _note("sine", 1318.5, t + 0.40, 0.6, 0.25);
      break;
    case "win":     // 勝利ファンファーレ
      [392, 523.25, 659.25, 783.99, 1046.5].forEach((f, i) => _note("triangle", f, t + i * 0.13, 0.35, 0.32));
      break;
    case "lose":
      [220, 196, 174.6, 130.8].forEach((f, i) => _note("sawtooth", f, t + i * 0.18, 0.3, 0.28));
      break;
    case "stagewipe":
      _note("sawtooth", 90, t, 0.55, 0.45); _note("sawtooth", 60, t + 0.18, 0.6, 0.35); break;
  }
}

// 音楽：簡易ループパターン。ステージごとに切替
const MUSIC_PATTERNS = {
  title:  { tempo: 80,  bass:[110, 130.8, 110, 146.8],         lead:[329.6, 392, 440, 392], leadType:"triangle" },
  stage1: { tempo: 92,  bass:[130.8, 196, 130.8, 174.6],       lead:[523.25, 659.25, 783.99, 659.25], leadType:"triangle" },
  stage2: { tempo: 108, bass:[110, 138.6, 130.8, 116.5],       lead:[392, 466.16, 523.25, 466.16], leadType:"square" },
  stage3: { tempo: 128, bass:[82.4, 92.5, 110, 87.3],          lead:[261.6, 311.1, 349.2, 392], leadType:"sawtooth" },
  win:    { tempo: 96,  bass:[130.8, 174.6, 196, 261.6],       lead:[523.25, 659.25, 783.99, 1046.5], leadType:"triangle" },
  lose:   { tempo: 60,  bass:[87.3, 73.4, 65.4, 58.2],         lead:[174.6, 164.8, 155.6, 146.8], leadType:"sawtooth" },
};

function music_play(track) {
  if (!audioCtx) { _musicTrack = track; return; }
  _musicTrack = track;
  if (_musicTimer) { clearTimeout(_musicTimer); _musicTimer = null; }
  _musicSchedule(audioCtx.currentTime + 0.06);
}
function music_stop() {
  _musicTrack = null;
  if (_musicTimer) { clearTimeout(_musicTimer); _musicTimer = null; }
}
function _musicSchedule(t0) {
  if (!audioCtx || !_musicTrack) return;
  const p = MUSIC_PATTERNS[_musicTrack];
  if (!p) return;
  const beat = 60 / p.tempo;
  for (let i = 0; i < 4; i++) {
    const tn = t0 + i * beat;
    _note("sine",     p.bass[i % p.bass.length],   tn,                  beat * 0.85, 0.18, musicGain);
    _note(p.leadType, p.lead[i % p.lead.length],   tn + beat * 0.10,    beat * 0.45, 0.10, musicGain);
    // たまにオクターブ上の装飾
    if ((i % 2) === 1) _note("triangle", p.lead[i % p.lead.length] * 2, tn + beat * 0.55, beat * 0.20, 0.06, musicGain);
  }
  const totalDur = 4 * beat;
  _musicTimer = setTimeout(() => _musicSchedule(t0 + totalDur), Math.max(50, totalDur * 1000 - 80));
}

function storyText(s) { return (typeof s === "string") ? s : (s && s.text) || ""; }
function queueStory(payload, dur) {
  if (!game.storyQueue) game.storyQueue = [];

}
function queueStorySeq(seq) { for (const s of seq) queueStory({ speaker:s.speaker, text:s.text }, s.dur || 4.0); }

// Stage 1：ガキ大将。通路変化(t=22.5)直後 t=25 にボス
function buildSpawnQueueStage1() {
  const q = [];
  for (let i = 0; i < 4; i++) q.push({ t: 3 + i * 3, type: "roach" });
  q.push({ t: 8,  type: "child" });
  q.push({ t: 14, type: "roach" });
  q.push({ t: 17, type: "poop" });
  q.push({ t: 25, type: "bratboss" }); // ★ 通路変更直後にボス
  for (let i = 0; i < 4; i++) q.push({ t: 32 + i * 2, type: "roach" });
  q.push({ t: 38, type: "child" });
  q.push({ t: 42, type: "poop" });
  q.sort((a,b)=>a.t-b.t);
  game.spawnQueue = q;
}

function spawnEnemy(type, pathIdx) {
  if (pathIdx == null) {
    pathIdx = game.nextPathIdx;
    game.nextPathIdx = 1 - game.nextPathIdx;
  }
  const def = ENEMY_DEFS[type];
  const px = pathPx(pathIdx);
  game.enemies.push({
    type, def, pathIdx,
    hp: def.hp, maxHp: def.hp,
    x: px[0].x + 4, y: px[0].y,
    seg: 0, knock: 0, contamAcc: 0, slowMul: 1,
    wobble: Math.random() * Math.PI * 2,
    hitFlash: 0,
  });
  // 初遭遇のセリフ（boss は降臨演出側で扱う）
  if (game.seenEnemy && !game.seenEnemy[type] && type !== "boss") {
    game.seenEnemy[type] = true;
    const line = type === "roach"    ? STORY_LINES.enemy_roach
              : type === "poop"      ? STORY_LINES.enemy_poop
              : type === "child"     ? STORY_LINES.enemy_child
              : null;
    if (line) queueStory(line, 4.0);
  }
}

// ---------- パーティクル ----------
function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 14 + Math.random() * 34;
    game.particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.28 + Math.random() * 0.28,
      maxLife: 0.56,
      size: 1 + Math.random() * 2,
      color,
    });
  }
}

// ───────── ゲーム停止式ダイアログ ─────────
// scenes: [{who, text, emo?}]
// onDone: 終了後に呼ぶコールバック（パス切替や mode 戻し）
function showDialog(scenes, onDone) {
  if (!scenes || scenes.length === 0) { if (onDone) onDone(); return; }
  game._modeBeforeDialog = game.mode;
  game.dialogQueue = scenes;
  game.dialogIdx = 0;
  game.dialogT = 0;
  game.dialogReturn = onDone;
  game.mode = "dialog";
}
function advanceDialog() {
  if (!game || game.mode !== "dialog") return;
  // タイプライタ中ならまず全文表示（VN標準）
  const cur = (game.dialogQueue || [])[game.dialogIdx];
  if (cur) {
    const charPerSec = 32;
    const fullDur = (cur.text || "").length / charPerSec;
    if ((game.dialogT || 0) < fullDur) {
      game.dialogT = fullDur + 0.05;
      return;
    }
  }
  // 次のセリフ／終了
  if (game.dialogIdx < (game.dialogQueue || []).length - 1) {
    game.dialogIdx += 1;
    game.dialogT = 0;
    return;
  }
  game.mode = game._modeBeforeDialog || "playing";
  const cb = game.dialogReturn;
  game.dialogReturn = null;
  game.dialogQueue = null;
  if (cb) cb();
}

function advancePrologue() {
  if (!game) return;
  if (game.mode !== "prologue") return;
  const cur = PROLOGUE_SCENES[game.proIdx];
  if (cur && cur.kind === "cta") { game.mode = "title"; _prologueSeen = true; return; }
  game.proIdx += 1;
  game.proT = 0;
  if (game.proIdx >= PROLOGUE_SCENES.length) { game.mode = "title"; _prologueSeen = true; }
}

function showStory(t, dur) {
  game.story = (typeof t === "string") ? { speaker:"", text:t } : (t || { speaker:"", text:"" });
  game.storyT = dur;
  game.storyMax = dur;
}
function flashMsg(s, t) { game.msg = s; game.msgT = t; }

// ---------- 入力 ----------
canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (W / rect.width);
  const sy = (e.clientY - rect.top)  * (H / rect.height);

window.addEventListener("keydown", (e) => {
  if (game.mode === "prologue") {
    if (e.key === "Escape") { game.mode = "title"; _prologueSeen = true; e.preventDefault(); return; }
    if (e.key === " " || e.key === "Enter") { advancePrologue(); e.preventDefault(); return; }
    return;
  }
  if (game.mode === "kamishibai_end") {
    if (e.key === "Escape" || e.key === " " || e.key === "Enter") { advanceEnding(); e.preventDefault(); return; }
    return;
  }
  if (game.mode === "dialog") {
    if (e.key === " " || e.key === "Enter") { advanceDialog(); e.preventDefault(); return; }
    return;
  }
  if (e.key === "r" || e.key === "R") { newGame(true); return; }
  if (game.mode !== "playing") return;
  if (e.key === "Escape") { if (game.movingTower) { flashMsg("移動キャンセル", 0.8); game.movingTower = null; } return; }
  if (e.key === "1") { game.selected = "toilet";  game.movingTower = null; }
  if (e.key === "2") { game.selected = "sink";    game.movingTower = null; }
  if (e.key === "3") { game.selected = "paper";   game.movingTower = null; }
  if (e.key === "4") { game.selected = "plunger"; game.movingTower = null; }
});

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (W / rect.width);
  const sy = (e.clientY - rect.top)  * (H / rect.height);
  game.hover.x = sx; game.hover.y = sy;
  game.hover.tx = Math.floor(sx / TILE);
  game.hover.ty = Math.floor((sy - PLAY_TOP) / TILE);
  game.hover.on = sy >= PLAY_TOP && sy < PLAY_BOTTOM
    && game.hover.tx >= 0 && game.hover.tx < MAP_W
    && game.hover.ty >= 0 && game.hover.ty < PLAY_H_TILES;
});
canvas.addEventListener("mouseleave", () => { game.hover.on = false; });

function towerAt(tx, ty) {
  return game.towers.find(t => t.tx === tx && t.ty === ty) || null;
}

function handleClick(x, y) {
  // 任意のクリックでオーディオ初期化（ブラウザのautoplay制限対策）
  if (!_audioStarted) { initAudio(); _audioStarted = true; if (game && game.mode === "prologue") music_play("title"); }

  // ★ スキップボタン判定（紙芝居・ダイアログ・エンディング共通：右上）
  // 内部解像度 320×240 のうち、x∈[260,316] y∈[2,18]
  if ((game.mode === "prologue" || game.mode === "dialog" || game.mode === "kamishibai_end")
      && x >= 260 && x <= 316 && y >= 2 && y <= 18) {
    if (game.mode === "prologue") {
      _prologueSeen = true;
      game.mode = "title";
      return;
    }
    if (game.mode === "dialog") {
      // ダイアログ全体スキップ：ループで advanceDialog を呼んで終了
      let safety = 64;
      while (game.mode === "dialog" && safety-- > 0) advanceDialog();
      return;
    }
    if (game.mode === "kamishibai_end") {
      // エンディングは最終ページに飛ばす→クリックでタイトルへ
      const list = ENDING_SCENES[game.endKind] || [];
      game.endIdx = Math.max(0, list.length - 1);
      game.endT = 0;
      return;
    }
  }

  if (game.mode === "prologue") { advancePrologue(); return; }
  if (game.mode === "kamishibai_end") { advanceEnding(); return; }
  if (game.mode === "dialog") { advanceDialog(); return; }
  if (game.mode === "title") { startPlay(); return; }
  if (game.mode === "ended") { newGame(true); return; }
  // playing
  if (y >= PLAY_BOTTOM) {
    const slot = Math.floor(x / 80);
    if (slot >= 0 && slot < 4) { game.selected = TOWER_KEYS[slot]; game.movingTower = null; }
    return;
  }
  if (y < PLAY_TOP) return;

  const tx = Math.floor(x / TILE);
  const ty = Math.floor((y - PLAY_TOP) / TILE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= PLAY_H_TILES) return;

  const existing = towerAt(tx, ty);

  // ★ 移動モード中：別マスへ移動 / 別塔へ切替 / 同塔クリックで取消
  if (game.movingTower) {
    if (existing === game.movingTower) {
      game.movingTower = null;
      flashMsg("移動キャンセル", 0.8);
      return;
    }
    if (existing) {
      game.movingTower = existing;
      game.selected = existing.type;
      flashMsg(`${existing.def.name}を持ち上げた`, 1.0);
      return;
    }
    if (pathTiles.has(ty * MAP_W + tx)) { flashMsg("通路には置けない", 1.0); return; }
    const t = game.movingTower;
    const oldCx = t.cx, oldCy = t.cy;
    const newCx = tx * TILE + TILE / 2;
    const newCy = PLAY_TOP + ty * TILE + TILE / 2;
    t.tx = tx; t.ty = ty;
    // ★ 瞬間移動はやめて、moveAnim.t で時間をかけて補間
    t.moveAnim = { fromX: oldCx, fromY: oldCy, toX: newCx, toY: newCy, t: 0, dur: 1.6 };
    t.cx = oldCx; t.cy = oldCy; // 開始位置はまだ旧位置のまま
    // 移動後はしばらく機能停止
    const MOVE_LOCK = 2.0;
    t.cd = Math.max(t.cd, MOVE_LOCK);
    t.cleanCd = Math.max(t.cleanCd, MOVE_LOCK);
    t.moveLockT = MOVE_LOCK;
    t.moveLockMax = MOVE_LOCK;
    t.attackFlash = 0;
    t.aimX = t.cx; t.aimY = t.cy;
    burst(oldCx, oldCy, t.def.color, 10);
    burst(t.cx, t.cy, t.def.color, 10);
    sfx("place");
    flashMsg("設置中… 約2秒で再稼働", 1.5);
    game.movingTower = null;
    return;
  }

  // 既存の塔をクリック → 移動モード開始
  if (existing) {
    game.movingTower = existing;
    game.selected = existing.type;
    flashMsg("移動先の床マスをクリック (ESCで取消)", 1.6);
    return;
  }

  if (pathTiles.has(ty * MAP_W + tx)) { flashMsg("通路に置くな（張り紙参照）", 1.0); return; }
  const def = TOWER_DEFS[game.selected];
  if (game.coins < def.cost) { flashMsg("予算オーバー", 1.0); return; }
  game.coins -= def.cost;
  sfx("place");
  const cx = tx * TILE + TILE/2, cy = PLAY_TOP + ty * TILE + TILE/2;
  game.towers.push({
    type: game.selected, def, tx, ty, cx, cy,
    cd: 0, cleanCd: 0,
    hp: def.hp, maxHp: def.hp,
    attackFlash: 0, bob: Math.random() * Math.PI * 2,
    aimX: cx, aimY: cy,
    hitFlash: 0,
  });
  burst(cx, cy, "#ffffff", 8);
}

// ---------- 更新 ----------
function update(dt) {
  if (game.mode === "prologue") {
    game.proT += dt;
    const sc = PROLOGUE_SCENES[game.proIdx];
    if (sc && sc.kind !== "cta" && game.proT >= sc.dur) {
      game.proIdx += 1; game.proT = 0;
      if (game.proIdx >= PROLOGUE_SCENES.length) { game.mode = "title"; _prologueSeen = true; }
    }
    return;
  }
  if (game.mode === "kamishibai_end") {
    game.endT += dt;
    const list = ENDING_SCENES[game.endKind] || [];
    const sc = list[game.endIdx];
    if (sc && !(sc.kind === "title" && sc.dur >= 90) && game.endT >= sc.dur) {
      game.endIdx += 1; game.endT = 0;
    }
    return;
  }
  if (game.mode === "dialog") {
    // ゲーム時間は止める。ダイアログのタイマーだけ進める
    game.dialogT = (game.dialogT || 0) + dt;
    return;
  }
  if (game.mode !== "playing") return;
  game.t += dt;
  game.stageT += dt;
  game.msgT = Math.max(0, game.msgT - dt);
  game.storyT = Math.max(0, game.storyT - dt);
  game.flash = Math.max(0, game.flash - dt);
  if (game.bossIntroT) game.bossIntroT = Math.max(0, game.bossIntroT - dt);
  if (game.bossKillT) game.bossKillT = Math.max(0, game.bossKillT - dt);
  // 物語キューが残っていて、現在のバナーが終わったら次へ
  if (game.storyT <= 0 && game.storyQueue && game.storyQueue.length > 0) {
    const nx = game.storyQueue.shift();
    showStory(nx.payload, nx.dur);
  }

  // ★ 次のボスを検知。出現時刻直前にゲームを停止して pre→in ダイアログを再生
  const nextBoss = game.spawnQueue[0] && ENEMY_DEFS[game.spawnQueue[0].type] && ENEMY_DEFS[game.spawnQueue[0].type].boss
    ? game.spawnQueue[0] : null;
  if (nextBoss && !game.bossPreFired && nextBoss.t - game.stageT <= 0.05) {
    game.bossPreFired = true;
    const stageNum = game.stage;
    const preKey = `stage${stageNum}_boss_pre`;
    const inKey  = `stage${stageNum}_boss_in`;
    showDialog(DIALOG[preKey] || [], () => {
      // pre終了後、ボスを出現させる + in ダイアログ（その後にプレイ再開）
      const s = game.spawnQueue.shift();
      const pathIdx = Math.random() < 0.5 ? 0 : 1;
      spawnEnemy(s.type, pathIdx);
      sfx("boss");
      const def = ENEMY_DEFS[s.type];
      flashMsg(`${def.name} 降臨！`, 2.4);
      game.flash = Math.max(game.flash, 0.55);
      game.bossIntroT = 2.0;
      game.bossIntroMax = 2.0;
      game.bossIntroPath = pathIdx;
      game.bossIntroName = def.name;
      game.bossIntroType = s.type;
      const px = pathPx(pathIdx);
      const c1 = s.type === "poopking" ? "#3a1f10" : s.type === "bratboss" ? "#4a3618" : "#4a2317";
      const c2 = s.type === "poopking" ? "#a06030" : s.type === "bratboss" ? "#d6b34a" : "#a02020";
      burst(px[0].x, px[0].y, c1, 32);
      burst(px[0].x, px[0].y, c2, 22);
      // 出現直後の会話 → 終わったら playing
      showDialog(DIALOG[inKey] || [], () => { game.mode = "playing"; });
    });
  }

  // 通常スポーン（ボスが既に処理済みの場合は飛ばさない＝先頭が roach 等）
  while (game.spawnQueue.length && game.spawnQueue[0].t <= game.stageT) {
    const s0 = game.spawnQueue[0];
    if (ENEMY_DEFS[s0.type] && ENEMY_DEFS[s0.type].boss) break; // ボスは pre ダイアログで処理
    const s = game.spawnQueue.shift();
    spawnEnemy(s.type, null);
  }

  // 敵の slowMul を毎フレーム再計算
  for (const e of game.enemies) e.slowMul = 1;
  for (const t of game.towers) {
    if (t.type !== "sink") continue;
    const r2 = t.def.range * t.def.range;
    for (const e of game.enemies) {
      if (e.hp <= 0) continue;
      const dx = e.x - t.cx, dy = e.y - t.cy;
      if (dx*dx + dy*dy <= r2) e.slowMul = Math.min(e.slowMul, t.def.slow);
    }
  }

  // 敵の更新（移動・汚染・到達判定）
  for (const e of game.enemies) {
    if (e.hp <= 0) continue;
    const tx = Math.floor(e.x / TILE);
    const ty = Math.floor((e.y - PLAY_TOP) / TILE);
    const tc = getContam(tx, ty);
    let boost = 1;
    if (tc >= 80) boost = 1.4;
    else if (tc >= 50) boost = 1.2;

    const speed = e.def.speed * e.slowMul * boost;
    let move = speed * dt;

    // 紙の縛りタイマーを減衰
    if (e.snareT && e.snareT > 0) e.snareT = Math.max(0, e.snareT - dt);
    const snared = (e.snareT && e.snareT > 0);

    if (e.knock > 0) {
      const knockSpeed = e.def.boss ? e.def.speed * 0.25 : e.def.speed * 0.8;
      const back = Math.min(e.knock, knockSpeed * dt);
      e.knock -= back;
      moveAlongPath(e, -back);
    } else if (!snared) {
      moveAlongPath(e, move);
    }
    // 縛られている間も汚染を撒くが、量は減らす（その場でジタバタする程度）
    // （contam処理は後段）

    e.wobble += dt * (e.type === "child" ? 11 : e.type === "roach" ? 15 : (e.def && e.def.boss) ? 5 : 7);
    e.hitFlash = Math.max(0, e.hitFlash - dt * 5);

    e.contamAcc += dt;
    if (e.contamAcc >= 0.25) {
      e.contamAcc = 0;
      addContamSpread(tx, ty, e.def.contam * 0.25);
    }

    if (e.seg >= PATHS[e.pathIdx].length - 1) {
      // ゴール到達：消えずにその場で滞留して継続ダメージ
      if (!e.atGoal) {
        e.atGoal = true;
        e.goalAcc = 0.0;
        game.hp -= 1;
        game.flash = 0.5;
        sfx("hpLoss");
        burst(e.x, e.y, "#7a421e", 8);
      } else {
        e.goalAcc += dt;
        // 居座りの継続ダメージ頻度（緩和：通常2.5秒/ボス1.5秒に1ダメージ）
        const tick = (e.def && e.def.boss) ? 1.5 : 2.5;
        if (e.goalAcc >= tick) {
          e.goalAcc -= tick;
          game.hp -= 1;
          game.flash = Math.max(game.flash, 0.30);
          sfx("hpLoss");
          // ゴールでも揺れる（停滞してるが死んではいない）
          burst(e.x, e.y, "#7a421e", 3);
        }
      }
    }
  }

  // ★ ボスの遠距離射撃（最も近い塔へ）
  for (const e of game.enemies) {
    if (e.hp <= 0 || !e.def || !e.def.boss || !e.def.shootCd) continue;
    e.shootCdT = (e.shootCdT || 0) - dt;
    if (e.shootCdT > 0) continue;
    // 範囲内の最寄り塔を探す
    let best = null, bestD = Infinity;
    const r2 = e.def.shootRange * e.def.shootRange;
    for (const t of game.towers) {
      if (t.hp <= 0) continue;
      const dx = t.cx - e.x, dy = t.cy - e.y;
      const d2 = dx*dx + dy*dy;
      if (d2 <= r2 && d2 < bestD) { best = t; bestD = d2; }
    }
    if (!best) continue;
    e.shootCdT = e.def.shootCd;
    const sd = Math.sqrt(bestD) || 1;
    const speed = 90;
    game.enemyShots.push({
      x: e.x, y: e.y,
      vx: (best.cx - e.x) / sd * speed,
      vy: (best.cy - e.y) / sd * speed,
      target: best,
      dmg: e.def.shootDmg,
      color: e.def.shootColor || "#3a1f10",
      life: 1.6,
    });
    sfx("splash");
  }
  // 敵弾の更新＋当たり判定
  for (const s of game.enemyShots || []) {
    s.x += s.vx * dt; s.y += s.vy * dt;
    s.life -= dt;
    if (!s.target || s.target.hp <= 0) { s.life = 0; continue; }
    const dx = s.target.cx - s.x, dy = s.target.cy - s.y;
    if (dx*dx + dy*dy < 9*9) {
      s.target.hp -= s.dmg;
      s.target.hitFlash = 1;
      burst(s.target.cx, s.target.cy, s.color, 6);
      s.life = 0;
    }
  }
  game.enemyShots = (game.enemyShots || []).filter(s => s.life > 0);

  // ★ 敵が近くの塔を攻撃（味方が壊れる）
  // ボスは auraR / auraDps を持ち、広範囲で塔を継続的に削る
  const DEFAULT_R2 = 20 * 20;
  for (const e of game.enemies) {
    if (e.hp <= 0) continue;
    const r = e.def.auraR || 20;
    const r2 = r * r;
    const dmgContact = e.def.towerDmg * dt;
    const dmgAura = (e.def.auraDps || 0) * dt;
    for (const t of game.towers) {
      if (t.hp <= 0) continue;
      const dx = t.cx - e.x, dy = t.cy - e.y;
      const d2 = dx*dx + dy*dy;
      // オーラ範囲：継続的に削る
      if (d2 <= r2 && dmgAura > 0) {
        t.hp -= dmgAura;
        t.hitFlash = Math.max(t.hitFlash, 0.6);
      }
      // 接触範囲：従来の towerDmg
      if (d2 <= DEFAULT_R2) {
        t.hp -= dmgContact;
        t.hitFlash = 1;
      }
      if (t.hp <= 0) {
        burst(t.cx, t.cy, "#ffd166", 18);
        burst(t.cx, t.cy, t.def.color, 12);
      }
    }
  }
  // 壊れた塔を除去
  game.towers = game.towers.filter(t => t.hp > 0);

  // 塔の更新（攻撃・清掃）
  for (const t of game.towers) {
    t.cd = Math.max(0, t.cd - dt);
    t.cleanCd = Math.max(0, t.cleanCd - dt);
    t.attackFlash = Math.max(0, t.attackFlash - dt * 4);
    t.hitFlash = Math.max(0, t.hitFlash - dt * 3);
    t.bob += dt * 1.6;
    if (t.moveLockT) t.moveLockT = Math.max(0, t.moveLockT - dt);
    // 移動アニメーション（瞬間移動の代わり）
    if (t.moveAnim) {
      t.moveAnim.t += dt;
      const k = Math.min(1, t.moveAnim.t / t.moveAnim.dur);
      // ease-in-out
      const ek = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
      t.cx = t.moveAnim.fromX + (t.moveAnim.toX - t.moveAnim.fromX) * ek;
      t.cy = t.moveAnim.fromY + (t.moveAnim.toY - t.moveAnim.fromY) * ek;
      t.aimX = t.cx; t.aimY = t.cy;
      if (k >= 1) { t.cx = t.moveAnim.toX; t.cy = t.moveAnim.toY; t.moveAnim = null; }
    }

    if (t.type === "toilet") {
      if (t.cd <= 0) {
        const target = findEnemyInRange(t.cx, t.cy, t.def.range);
        if (target) {
          t.cd = t.def.cd;
          t.attackFlash = 1;
          t.aimX = target.x; t.aimY = target.y;
          game.shots.push({
            kind: "toilet", x: t.cx, y: t.cy, tx: target.x, ty: target.y, target,
            dmg: t.def.dmg, life: 0.3, lifeMax: 0.3, color: "#a8d8ff", knock: 0,
          });
        }
      }
    } else if (t.type === "plunger") {
      if (t.cd <= 0) {
        const target = findEnemyInRange(t.cx, t.cy, t.def.range);
        if (target) {
          t.cd = t.def.cd;
          t.attackFlash = 1;
          t.aimX = target.x; t.aimY = target.y;
          game.shots.push({
            kind: "plunger", x: t.cx, y: t.cy, tx: target.x, ty: target.y, target,
            dmg: t.def.dmg, life: 0.3, lifeMax: 0.3, color: "#ff8066", knock: t.def.knock,
          });
        }
      }
    } else if (t.type === "paper") {
      if (t.cleanCd <= 0) {
        t.cleanCd = 0.2;
        if (Math.random() < 0.45) sfx("clean");
        t.attackFlash = 1;
        const r = t.def.radius;
        const amt = t.def.clean;
        // ★ 範囲内の敵を紙で縛る（snareT を更新）
        const rPx = r * TILE;
        const rPx2 = rPx * rPx;
        for (const e of game.enemies) {
          if (e.hp <= 0) continue;
          const dxe = e.x - t.cx, dye = e.y - t.cy;
          if (dxe*dxe + dye*dye <= rPx2) {
            e.snareT = Math.max(e.snareT || 0, t.def.snareDur || 0.7);
          }
        }
        let cleaned = 0;
        // 個々のタイルに「光ったマーカー」を残して可視化
        if (!game.cleanFx) game.cleanFx = [];
        for (let dy = -r; dy <= r; dy++) {
          for (let dx = -r; dx <= r; dx++) {
            if (dx*dx + dy*dy > r*r) continue;
            const ntx = t.tx + dx, nty = t.ty + dy;
            if (ntx < 0 || ntx >= MAP_W || nty < 0 || nty >= PLAY_H_TILES) continue;
            const c = getContam(ntx, nty);
            if (c > 0) {
              setContam(ntx, nty, c - amt);
              cleaned += Math.min(c, amt);
              // 清掃された各タイルを白く光らせる（短命）
              game.cleanFx.push({ tx:ntx, ty:nty, life:0.55, max:0.55 });
            }
          }
        }
        // 紙吹雪は cleaned 量に比例して多めに撒く
        const sparkles = cleaned > 0 ? 8 : 2;
        for (let i = 0; i < sparkles; i++) {
          const ang = Math.random() * Math.PI * 2;
          const d = Math.random() * r * TILE * 0.85;
          game.particles.push({
            x: t.cx + Math.cos(ang) * d,
            y: t.cy + Math.sin(ang) * d,
            vx: (Math.random() - 0.5) * 18,
            vy: -14 - Math.random() * 18,
            life: 0.45 + Math.random() * 0.30,
            maxLife: 0.75,
            size: 1.8 + Math.random() * 2.0,
            color: cleaned > 0 ? "#fff8d8" : "#dadce0",
          });
        }
        // 「-数字」のテキストポップ（清掃量を数字で見える化）
        if (cleaned > 0) {
          game.particles.push({
            x: t.cx, y: t.cy - 14,
            vx: 0, vy: -22,
            life: 0.65, maxLife: 0.65,
            size: 9, color: "#b8f2ad",
            text: `−${Math.round(cleaned)}`,
          });
        }
      }
    }
  }

  // 弾
  for (const s of game.shots) {
    s.life -= dt;
    if (s.life <= 0 && s.target && s.target.hp > 0) {
      const willDie = s.target.hp - s.dmg <= 0;
      s.target.hp -= s.dmg;
      s.target.hitFlash = 1;
      if (willDie) sfx("kill"); else sfx("shoot");
      if (s.knock > 0) {
        // ボスごとに knockResist で減衰（ガキ大将はほぼ無効）
        const resist = (s.target.def && s.target.def.knockResist != null)
          ? s.target.def.knockResist
          : (s.target.def && s.target.def.boss ? 0.25 : 1.0);
        const k = s.knock * resist;
        s.target.knock = Math.max(s.target.knock, k);
      }
      burst(s.target.x, s.target.y, s.color, 5);
    }
  }
  game.shots = game.shots.filter(s => s.life > 0);

  // パーティクル
  for (const p of game.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 22 * dt;
    p.life -= dt;
  }
  game.particles = game.particles.filter(p => p.life > 0);
  // 紙の清掃エフェクト（タイル単位の白光）の寿命
  if (game.cleanFx) {
    for (const f of game.cleanFx) f.life -= dt;
    game.cleanFx = game.cleanFx.filter(f => f.life > 0);
  }

  for (const e of game.enemies) {
    if (e.hp <= 0 && !e.counted) {
      e.counted = true;
      const isBoss = e.def && e.def.boss;
      // ボスはゴール居座り中に倒しても撃破扱い（ステージ進行を保証）
      if (e.seg < PATHS[e.pathIdx].length - 1 || isBoss) {
        game.coins += e.def.reward;
        burst(e.x, e.y, e.def.color, 10);
        if (isBoss) {
          sfx("bossKill");
          sfx("win");
          game.bossKills = (game.bossKills || 0) + 1;
          game.bossKillT = 2.6;
          game.bossKillMax = 2.6;
          game.bossKillX = e.x; game.bossKillY = e.y;
          game.bossKillName = e.def.name;
          game.flash = Math.max(game.flash, 0.55);
          burst(e.x, e.y, "#ffd86b", 60);
          burst(e.x, e.y, "#ffffff", 36);
          burst(e.x, e.y, "#a0e8ff", 24);
          burst(e.x, e.y, "#b8f2ad", 18);
          flashMsg(`${e.def.name} 撃破！`, 3.5);
          // 撃破ダイアログ → ステージクリア → 次ステージ or 勝利
          const killKey = `stage${game.stage}_boss_kill`;
          const dlg = DIALOG[killKey] || [];
          const stageNum = game.stage;
          setTimeout(() => {
            if (!game) return;
            showDialog(dlg, () => { advanceAfterBossKill(stageNum); });
          }, 1100);
        }
      }
    }
  }
  game.enemies = game.enemies.filter(e => e.hp > 0);

  // Stage2 入口の汚染源
  if (game.stage === 2) {
    game.entryContamAcc += dt;
    if (game.entryContamAcc >= 0.5) {
      game.entryContamAcc = 0;
      for (const PATH of PATHS) {
        const ep = PATH[0];
        setContam(ep.tx, ep.ty, getContam(ep.tx, ep.ty) + 0.32);
        setContam(ep.tx - 1, ep.ty, getContam(ep.tx - 1, ep.ty) + 0.13);
        setContam(ep.tx, ep.ty + 1, getContam(ep.tx, ep.ty + 1) + 0.13);
        setContam(ep.tx, ep.ty - 1, getContam(ep.tx, ep.ty - 1) + 0.13);
      }
    }
  }

  // Stage2 拡散
  if (game.stage === 2 && Math.random() < dt * 0.45) {
    const tx = (Math.random() * MAP_W) | 0;
    const ty = (Math.random() * PLAY_H_TILES) | 0;
    const c = getContam(tx, ty);
    if (c > 5) {
      const ndx = (Math.random() * 3 | 0) - 1;
      const ndy = (Math.random() * 3 | 0) - 1;
      setContam(tx + ndx, ty + ndy, getContam(tx + ndx, ty + ndy) + c * 0.15);
    }
  }

  // 勝敗判定
  const ac = avgContam();
  // 軽いプレイ中バナー（戦況メモ＋日記の断片。pause しない）
  if (game.stage === 1) {
    if (!game.stage1WarnFired && (ac >= 22 || game.stageT >= 20)) { game.stage1WarnFired = true; queueStory(STORY_LINES.stage1_warn, 4.0); }
    if (!game.storyDiary1Fired && game.stageT >= 32) { game.storyDiary1Fired = true; queueStory(STORY_LINES.diary_1, 4.0); }
  }
  if (game.stage === 2) {
    if (!game.stage2WarnFired && (ac >= 35 || game.stageT >= 18)) { game.stage2WarnFired = true; queueStory(STORY_LINES.stage2_warn, 4.0); }
    if (!game.storyDiary2Fired && game.stageT >= 28) { game.storyDiary2Fired = true; queueStory(STORY_LINES.diary_2, 4.0); }
  }
  if (game.stage === 3) {
    if (!game.stage3WarnFired && game.stageT >= 8) { game.stage3WarnFired = true; queueStory(STORY_LINES.stage3_warn, 4.0); }
    if (!game.storyDiary3Fired && game.stageT >= 22) { game.storyDiary3Fired = true; queueStory(STORY_LINES.diary_3, 4.0); }
  }
  // ★ 中盤の通路変化（各ステージで1回、t=22.5）— ダイアログでゲームを停止
  if (!game.pathChangedFired && game.stageT >= 22.5 && game.stage >= 1 && game.stage <= 3) {
    game.pathChangedFired = true;
    const dlg = DIALOG[`stage${game.stage}_path`];
    if (dlg) {
      const stageNum = game.stage;
      showDialog(dlg, () => {
        sfx("stagewipe");
        setStagePaths(stageNum, "late");
        flashMsg("通路が変化した", 1.6);
        // 通路上の塔/敵は座標がズレるが、敵は次セグメントへ向かい続けるので問題ない
      });
    }
  }
  if (game.hp <= 0) endGame(false, "lose_hp");
  else if (ac >= 100) endGame(false, "lose_contam");
  // ★ ステージ遷移は「ボス撃破時に advanceAfterBossKill() が呼ぶ」のみ。時間切れ遷移は廃止。
}

// ボス撃破後にステージを進める（または最終勝利）
function advanceAfterBossKill(stageNum) {
  // 残党をすべて流す
  for (const e of game.enemies) { burst(e.x, e.y, "#7a421e", 6); e.hp = 0; e.counted = true; }
  game.shots = [];
  if (stageNum >= 3) {
    endGame(true);
    return;
  }
  // 次ステージへ
  sfx("stagewipe");
  game.stage = stageNum + 1;
  game.stageT = 0;
  setStagePaths(game.stage, "early");
  game.pathChangedFired = false;
  game.bossPreFired = false;
  flashMsg(`Stage ${game.stage}`, 2.4);
  if (game.stage === 2) { buildSpawnQueueStage2(); music_play("stage2"); showDialog(DIALOG.stage2_intro, () => { game.mode = "playing"; }); game.coins += 30; }
  else if (game.stage === 3) { buildSpawnQueueStage3(); music_play("stage3"); showDialog(DIALOG.stage3_intro, () => { game.mode = "playing"; }); game.coins += 40; }
}

function endGame(won, reason) {
  game.won = won;
  game.endReason = reason;
  game.storyQueue = [];
  music_play(won ? "win" : "lose");
  const kind = won ? "win" : (reason === "lose_contam" ? "lose_contam" : "lose_hp");
  // ① キャラ会話（pause-dialog）→ ② 紙芝居エンディング
  const finalDialog = DIALOG[kind];
  const goKamishibai = () => {
    game.mode = "kamishibai_end";
    game.endIdx = 0;
    game.endT = 0;
    game.endKind = kind;
  };
  if (finalDialog && finalDialog.length) {
    showDialog(finalDialog, goKamishibai);
  } else {
    goKamishibai();
  }
}
function advanceEnding() {
  if (!game || game.mode !== "kamishibai_end") return;
  const list = ENDING_SCENES[game.endKind] || [];
  const cur = list[game.endIdx];
  if (cur && cur.kind === "title" && cur.dur >= 90) {
    // 最終ページ：再挑戦／タイトルへ
    if (game.won) { _prologueSeen = true; newGame(true); }
    else { newGame(true); }
    return;
  }
  game.endIdx += 1;
  game.endT = 0;
  if (game.endIdx >= list.length) {
    // セーフティ：全て見終えたら戻す
    if (game.won) { _prologueSeen = true; newGame(true); }
    else { newGame(true); }
  }
}

function addContamSpread(tx, ty, amount) {
  const cells = [
    [tx, ty, 1.0],
    [tx-1, ty, 0.35], [tx+1, ty, 0.35],
    [tx, ty-1, 0.35], [tx, ty+1, 0.35],
  ];
  for (const [x, y, w] of cells) setContam(x, y, getContam(x, y) + amount * w);
}

function moveAlongPath(e, move) {
  const px = pathPx(e.pathIdx);
  const path = PATHS[e.pathIdx];
  while (move !== 0 && e.seg < path.length - 1) {
    const a = px[e.seg], b = px[e.seg + 1];
    const dx = b.x - e.x, dy = b.y - e.y;
    const dist = Math.hypot(dx, dy);
    if (move > 0) {
      if (dist <= move) { e.x = b.x; e.y = b.y; move -= dist; e.seg++; }
      else { e.x += dx / dist * move; e.y += dy / dist * move; move = 0; }
    } else {
      const back = -move;
      if (e.seg === 0) {
        const ax = px[0].x, ay = px[0].y;
        const bdx = ax - e.x, bdy = ay - e.y;
        const bd = Math.hypot(bdx, bdy);
        if (bd <= back) { e.x = ax; e.y = ay; }
        else { e.x += bdx/bd * back; e.y += bdy/bd * back; }
        move = 0;
      } else {
        const prev = px[e.seg - 1];
        const pdx = prev.x - e.x, pdy = prev.y - e.y;
        const pd = Math.hypot(pdx, pdy);
        if (pd <= back) {
          e.x = prev.x; e.y = prev.y; e.seg--;
          move += pd;
          if (move >= 0) move = 0;
        } else { e.x += pdx / pd * back; e.y += pdy / pd * back; move = 0; }
      }
    }
  }
}

function findEnemyInRange(x, y, r) {
  let best = null, bestSeg = -1;
  const r2 = r * r;
  for (const e of game.enemies) {
    if (e.hp <= 0) continue;
    const dx = e.x - x, dy = e.y - y;
    if (dx*dx + dy*dy > r2) continue;
    if (e.seg > bestSeg) { best = e; bestSeg = e.seg; }
  }
  return best;
}

// ---------- 描画ヘルパ ----------
function roundedRect(x, y, w, h, r) {
  const radius = Math.max(0, Math.min(r, Math.abs(w)/2, Math.abs(h)/2));
  ctx.beginPath();
  ctx.moveTo(x+radius, y);
  ctx.lineTo(x+w-radius, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+radius);
  ctx.lineTo(x+w, y+h-radius);
  ctx.quadraticCurveTo(x+w, y+h, x+w-radius, y+h);
  ctx.lineTo(x+radius, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-radius);
  ctx.lineTo(x, y+radius);
  ctx.quadraticCurveTo(x, y, x+radius, y);
  ctx.closePath();
  ctx.fill();
}
function text(value, x, y, color="#fff", size=10) {
  ctx.font = `700 ${size}px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = "#0c0e12";
  ctx.strokeText(value, x, y);
  ctx.fillStyle = color;
  ctx.fillText(value, x, y);
}
function tinyText(value, x, y, color="#fff") {
  ctx.font = `700 8px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.lineWidth = 2;
  ctx.strokeStyle = color === "#40352a" ? "rgba(255,255,255,0.55)" : "#0c0e12";
  ctx.strokeText(value, x, y);
  ctx.fillStyle = color;
  ctx.fillText(value, x, y);
}
function centerText(value, y, color="#fff", size=14) {
  ctx.font = `800 ${size}px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textBaseline = "middle";

}

function render() {
  if (game.mode === "prologue") { drawPrologue(); return; }
  if (game.mode === "kamishibai_end") { drawEndingKamishibai(); return; }
  if (game.mode === "title") { drawTitleOverlay(); return; }
  ctx.fillStyle = game.stage === 1 ? "#101820" : "#1a0e0e";
  ctx.fillRect(0, 0, W, H);

  drawField();
  drawPathLines();
  drawSigns();

  // 紙タワーの常時射程リング（薄く）と清掃タイル光（タイル白オーバーレイ）
  drawPaperRangeRings();
  drawCleanTileFx();

  for (const t of game.towers) drawTower(t);
  drawPlacePreview();
  drawMovePreview();
  for (const e of game.enemies) drawEnemy(e);
  for (const s of game.shots) drawShot(s);
  // 敵弾（ボスの遠距離攻撃）
  for (const s of game.enemyShots || []) {
    ctx.fillStyle = s.color || "#3a1f10";
    ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(255, 80, 60, 0.6)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(s.x, s.y, 4 + Math.sin(performance.now()/80) * 0.6, 0, Math.PI * 2); ctx.stroke();
  }
  drawParticles();

  if (game.flash > 0) {
    ctx.fillStyle = `rgba(200,40,40,${game.flash})`;
    ctx.fillRect(0, PLAY_TOP, W, PLAY_BOTTOM - PLAY_TOP);
  }

  drawCrisisEffects();
  drawBossIntro();
  drawBossKill();

  drawTopHUD();
  drawBottomHUD();
  drawStoryBanner();
  if (game.mode === "dialog") drawDialogOverlay();
}

// ダイアログのキャラ→画像（フレームインデックス）の対応
function getDialogPortrait(who, emo) {
  // 保健所は清掃班長の立ち絵を流用（フレーム/タグの色だけ別系統に）
  if (who === "inspector" && PORTRAITS.clean && PORTRAITS.clean.complete) return PORTRAITS.clean;
  // 立ち絵PNGが用意されているキャラを最優先（assets/portraits/port_<who>.png）
  if (PORTRAITS[who] && PORTRAITS[who].complete && PORTRAITS[who].naturalWidth > 0) {
    return PORTRAITS[who];
  }
  // 立ち絵が無いキャラ（前任の日記/保健所）はテキストアバター
  // 緊急フォールバック：シートのフレーム
  if (who === "brat") {
    const arr = SPRITES.bratboss && SPRITES.bratboss.portraits;
    if (arr && arr.length) return arr[Math.min(arr.length - 1, emo || 0)];
  } else if (who === "king") {
    const arr = SPRITES.poopking && SPRITES.poopking.portraits;
    if (arr && arr.length) return arr[Math.min(arr.length - 1, emo || 0)];
  } else if (who === "filth") {
    const arr = SPRITES.boss && SPRITES.boss.frames;
    if (arr && arr.length) return arr[Math.min(arr.length - 1, emo || 0)];
  }
  return null;
}
function dialogSpeakerName(who) {
  return who === "clean"     ? "清掃班長"

       : who === "diary"     ? "前任の日記"

function dialogSpeakerColor(who) {

       : who === "rookie"    ? "#b8f2ad"
       : who === "diary"     ? "#d2b88a"

function drawDialogOverlay() {
  const sc = (game.dialogQueue || [])[game.dialogIdx];
  if (!sc) return;

  // ━━━ シーンごとのタイマー ━━━
  const elapsed = game.dialogT || 0;
  // 立ち絵：登場(slide-in 0.25s) → 喋りバウンス(continuous)
  const enterT = Math.min(1, elapsed / 0.25);
  const enterEase = 1 - Math.pow(1 - enterT, 3);
  // タイプライタ：1文字あたり0.04s（速め）。上限で全文表示
  const fullText = sc.text || "";
  const charPerSec = 32;
  const shownChars = Math.min(fullText.length, Math.floor(elapsed * charPerSec));
  const stillTyping = shownChars < fullText.length;
  const shownText = fullText.substring(0, shownChars);

  // 暗幕：ゲーム画面の上に半透明ベール
  ctx.fillStyle = "rgba(4, 6, 10, 0.55)";
  ctx.fillRect(0, 0, W, H);

  // ダイアログボックス（縦にもっと広く取る）— 入場時に下から少しスライド
  const boxX = 4, boxY = 96 + (1 - enterEase) * 26, boxW = W - 8, boxH = H - 4 - 96;
  // 細い影
  ctx.fillStyle = `rgba(0,0,0,${0.45 * enterEase})`;
  ctx.fillRect(boxX + 2, boxY + 2, boxW, boxH);
  ctx.fillStyle = `rgba(8, 10, 14, ${0.94 * enterEase})`;
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = `rgba(255, 216, 107, ${0.85 * enterEase})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
  ctx.strokeStyle = `rgba(255, 216, 107, ${0.32 * enterEase})`;
  ctx.strokeRect(boxX + 2.5, boxY + 2.5, boxW - 5, boxH - 5);

  // ━━━ キャラ立ち絵（左側）— 入場で左からスライドイン＋喋りバウンス ━━━
  const portrait = getDialogPortrait(sc.who, sc.emo);
  const baseX = boxX + 8, baseY = boxY + 6, portW = 70, portH = 78;
  // 入場時に左から
  const slideInX = baseX - (1 - enterEase) * 40;
  // タイプライタ進行中：縦バウンス＋わずかな水平揺れ
  const bounceY = stillTyping ? Math.sin(performance.now() / 90) * 2.0 : 0;
  const swayX  = stillTyping ? Math.sin(performance.now() / 130) * 0.8 : 0;
  const portX = slideInX + swayX, portY = baseY + bounceY;

  // 立ち絵の枠
  ctx.save();
  ctx.globalAlpha = enterEase;
  ctx.fillStyle = "rgba(20, 28, 40, 0.96)";
  ctx.fillRect(portX, portY, portW, portH);
  ctx.strokeStyle = dialogSpeakerColor(sc.who);
  ctx.lineWidth = stillTyping ? 1.5 : 1;
  ctx.strokeRect(portX + 0.5, portY + 0.5, portW - 1, portH - 1);

  if (portrait) {
    const pw = portrait.naturalWidth || portrait.width;
    const ph = portrait.naturalHeight || portrait.height;
    if (pw && ph) {
      const k = Math.min((portW - 6) / pw, (portH - 6) / ph);
      // 喋ってる間はわずかにスケール脈動
      const sc2 = stillTyping ? (1 + 0.04 * Math.sin(performance.now() / 110)) : 1;
      const dw = Math.round(pw * k * sc2), dh = Math.round(ph * k * sc2);
      ctx.drawImage(portrait, portX + (portW - dw) / 2, portY + (portH - dh) / 2, dw, dh);
    }
  } else {
    const init = (sc.who === "clean" ? "班"
               : sc.who === "rookie" ? "新"
               : sc.who === "diary" ? "日"
               : sc.who === "inspector" ? "保"
               : "?");
    ctx.fillStyle = dialogSpeakerColor(sc.who);
    const fs = stillTyping ? 28 + Math.sin(performance.now() / 100) * 1.5 : 28;
    ctx.font = `900 ${fs}px "Yu Gothic UI", Meiryo, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(init, portX + portW / 2, portY + portH / 2);
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  }
  ctx.restore();

  // 名前タグ — 喋ってる間は色が脈動
  const name = dialogSpeakerName(sc.who);
  if (name) {
    ctx.font = `800 9px "Yu Gothic UI", Meiryo, sans-serif`;
    const nW = Math.ceil(ctx.measureText(name).width) + 12;
    const namePulse = stillTyping ? (0.7 + 0.3 * Math.sin(performance.now()/180)) : 1;
    ctx.fillStyle = `rgba(40, 22, 12, ${0.95 * enterEase})`;
    ctx.fillRect(portX, portY + portH + 2, nW, 12);
    ctx.strokeStyle = dialogSpeakerColor(sc.who);
    ctx.lineWidth = 1;
    ctx.strokeRect(portX + 0.5, portY + portH + 2.5, nW - 1, 11);
    ctx.fillStyle = dialogSpeakerColor(sc.who);
    ctx.globalAlpha = namePulse * enterEase;
    ctx.textBaseline = "middle";
    ctx.fillText(name, portX + 6, portY + portH + 8);
    ctx.globalAlpha = 1;
  }

  // ━━━ 本文（右側）— 小さめフォント・大量表示 ━━━
  const txX = baseX + portW + 10;
  const txY = boxY + 10;
  // 折返し幅をさらに拡大、フォント縮小、行数増
  const lines = wrapJP(shownText, 40);
  ctx.font = `700 11px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textBaseline = "top"; ctx.textAlign = "left";
  ctx.lineWidth = 3;
  const isBossSpeaker = (sc.who === "brat" || sc.who === "filth" || sc.who === "king");
  // 最大12行表示
  for (let i = 0; i < Math.min(12, lines.length); i++) {
    const y = txY + i * 13;
    ctx.strokeStyle = `rgba(0,0,0,${enterEase})`;
    ctx.strokeText(lines[i], txX, y);
    if (isBossSpeaker && stillTyping) {
      let cx = txX;
      for (const ch of lines[i]) {
        const offY = Math.sin(performance.now() / 140 + cx * 0.3) * 1.4;
        ctx.fillStyle = `rgba(255, 220, 200, ${enterEase})`;
        ctx.fillText(ch, cx, y + offY);
        cx += ctx.measureText(ch).width;
      }
    } else {
      ctx.fillStyle = `rgba(247, 240, 220, ${enterEase})`;
      ctx.fillText(lines[i], txX, y);
    }
  }
  // タイプライタのカーソル（喋り中だけ点滅）
  if (stillTyping) {
    const lastLine = lines[lines.length - 1] || "";
    const lastLineW = ctx.measureText(lastLine).width;
    const ly = txY + (Math.min(11, lines.length - 1)) * 13;
    if ((Math.floor(performance.now() / 100) % 2) === 0) {
      ctx.fillStyle = "#ffd86b";
      ctx.fillRect(txX + lastLineW + 1, ly + 1, 5, 11);
    }
  }

  // 進行マーカー — 全文表示完了で点滅、表示中は静か
  ctx.font = `700 9px "Yu Gothic UI", Meiryo, sans-serif`;
  ctx.textAlign = "right"; ctx.textBaseline = "bottom";
  if (!stillTyping) {
    const blink = (Math.sin(performance.now() / 240) + 1) / 2;
    const dy = -2 + Math.sin(performance.now() / 200) * 1.2;
    ctx.fillStyle = `rgba(184, 242, 173, ${0.55 + 0.45 * blink})`;
    ctx.fillText(`${game.dialogIdx + 1} / ${game.dialogQueue.length}  ▼`, boxX + boxW - 6, boxY + boxH - 4 + dy);
  } else {
    ctx.fillStyle = "rgba(120,120,120,0.6)";
    ctx.fillText(`${game.dialogIdx + 1} / ${game.dialogQueue.length}`, boxX + boxW - 6, boxY + boxH - 4);
  }
  ctx.fillStyle = "rgba(160,160,160,0.6)";
  ctx.fillText("クリックで進む", boxX + boxW - 6, boxY + 12);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  drawSkipButton();
}
